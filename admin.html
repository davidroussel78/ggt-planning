<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGT — Admin CoachDav</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a23; --surface2: #1e2330;
    --border: rgba(255,255,255,0.08); --text: #e8eaf0;
    --muted: #7a8099; --accent: #4f8ef7; --orange: #fc4c02; --green: #22c55e;
  }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--text);
    background-image: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(252,76,2,0.05) 0%, transparent 60%);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 0.5px solid var(--border);
    background: rgba(22,26,35,0.9); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10; flex-wrap: wrap; gap: 8px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, #fc4c02, #e8350a);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo h1 { font-size: 16px; font-weight: 600; }
  .logo p { font-size: 11px; color: var(--orange); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-head {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 6px 12px; color: var(--muted);
    font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer;
    transition: color 0.2s; text-decoration: none; display: inline-block;
  }
  .btn-head:hover { color: var(--text); }

  .main { max-width: 960px; margin: 0 auto; padding: 24px; }

  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 14px; padding: 16px 20px; margin-bottom: 16px;
  }
  .nav-btn {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 7px 14px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); }
  .week-info { text-align: center; }
  .week-info h2 { font-size: 16px; font-weight: 600; }
  .week-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .status-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
  .status-published { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-draft     { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .status-empty     { background: rgba(122,128,153,0.15); color: var(--muted); }

  .days-list { display: flex; flex-direction: column; gap: 10px; }

  .day-row {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: grid; grid-template-columns: 90px 1fr; gap: 12px; align-items: start;
  }
  .day-row.today-row { border-color: rgba(79,142,247,0.3); }
  .day-label .dname { font-size: 13px; font-weight: 600; }
  .day-label .ddate { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Plans container */
  .plans-container { display: flex; flex-direction: column; gap: 10px; }
  .plan-block {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 10px; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative;
  }
  .plan-block-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  select, input[type="text"] {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 7px; padding: 6px 10px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 12px; outline: none; cursor: pointer;
  }
  select:focus, input[type="text"]:focus { border-color: var(--accent); }
  .select-type { width: 180px; }
  .input-location { width: 160px; }
  input[type="text"]::placeholder { color: var(--muted); }

  textarea {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 7px; padding: 10px 12px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px; outline: none;
    resize: vertical; min-height: 75px; line-height: 1.5; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .shortcuts { display: flex; flex-wrap: wrap; gap: 4px; }
  .shortcut {
    background: rgba(79,142,247,0.08); border: 0.5px solid rgba(79,142,247,0.2);
    border-radius: 5px; padding: 2px 7px; font-size: 10px; color: var(--muted);
    cursor: pointer; transition: color 0.15s, border-color 0.15s; user-select: none;
  }
  .shortcut:hover { color: var(--accent); border-color: var(--accent); }

  .btn-add-plan {
    background: transparent; border: 0.5px dashed var(--border);
    border-radius: 8px; padding: 8px; color: var(--muted);
    font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s; width: 100%; text-align: center;
  }
  .btn-add-plan:hover { border-color: var(--accent); color: var(--accent); }

  .btn-remove-plan {
    position: absolute; top: 8px; right: 8px;
    background: rgba(224,0,32,0.1); border: none; border-radius: 5px;
    padding: 3px 8px; color: #ff6b6b; font-size: 11px; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-remove-plan:hover { background: rgba(224,0,32,0.2); }

  .actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .btn-save {
    flex: 1; padding: 12px; border-radius: 10px;
    background: var(--surface); border: 0.5px solid var(--border);
    color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 14px;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .btn-save:hover { border-color: var(--accent); color: var(--text); }
  .btn-publish {
    flex: 2; padding: 12px; border-radius: 10px; border: none;
    background: var(--orange); color: #fff;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .btn-publish:hover { opacity: 0.9; }
  .btn-publish:active { transform: scale(0.98); }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-unpublish {
    flex: 1; padding: 12px; border-radius: 10px;
    background: transparent; border: 0.5px solid rgba(224,0,32,0.3);
    color: #ff6b6b; font-family: 'Outfit', sans-serif; font-size: 13px;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-unpublish:hover { background: rgba(224,0,32,0.1); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 0.5px solid rgba(34,197,94,0.4);
    border-radius: 10px; padding: 12px 20px; font-size: 13px; color: var(--green);
    transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(224,0,32,0.4); color: #ff6b6b; }

  .draft-notice {
    background: rgba(245,158,11,0.1); border: 0.5px solid rgba(245,158,11,0.3);
    border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #f59e0b;
    margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏃</div>
    <div>
      <h1>GGT Admin</h1>
      <p>CoachDav</p>
    </div>
  </div>
  <div class="header-right">
    <a href="planning.html" class="btn-head">👁 Voir comme adhérent</a>
    <button class="btn-head" onclick="logout()">Déconnexion</button>
  </div>
</header>

<div class="main">

  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">← Précédente</button>
    <div class="week-info">
      <h2 id="week-label">Chargement...</h2>
      <p id="week-dates"></p>
    </div>
    <button class="nav-btn" onclick="changeWeek(1)">Suivante →</button>
  </div>

  <div class="status-bar">
    <span class="status-badge status-empty" id="status-badge">● Vide</span>
    <span style="font-size:12px;color:var(--muted)" id="last-update"></span>
  </div>

  <div class="draft-notice" id="draft-notice">
    ⚠️ Ce planning est en brouillon — les adhérents ne le voient pas encore. Clique sur "Publier" pour le rendre visible.
  </div>

  <div class="days-list" id="days-list">
    <div style="text-align:center;padding:40px;color:var(--muted)">Chargement...</div>
  </div>

  <div class="actions">
    <button class="btn-save" onclick="saveDraft()">💾 Brouillon</button>
    <button class="btn-publish" id="btn-pub" onclick="publish()">📤 Publier la semaine</button>
    <button class="btn-unpublish" id="btn-unpub" onclick="unpublish()" style="display:none">🔒 Dépublier</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7a3obsTgqf5An8v1t8fpQWCln-ZbZWpk",
  authDomain: "ggt-planning-30503.firebaseapp.com",
  projectId: "ggt-planning-30503",
  storageBucket: "ggt-planning-30503.firebasestorage.app",
  messagingSenderId: "172309807991",
  appId: "1:172309807991:web:6a66ce809970c10c375772"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
  const TYPES = [
    { value: "repos",   label: "😴 Repos" },
    { value: "cotes",   label: "🏔 Côtes" },
    { value: "seuil",   label: "⚡ Seuil / Fractionné" },
    { value: "sortie",  label: "🌲 Sortie longue" },
    { value: "footing", label: "🏃 Footing" },
    { value: "course",  label: "🏅 Course / Compét" },
    { value: "rm",      label: "💪 Renforcement Musculaire" },
    { value: "autre",   label: "📋 Autre" },
  ];
  const ABBREVS = ["CB","CH","CE","MB","ME","CCE","CCH","CCL","CCR","RAC","EF","TV","TP","VMA","R","S1","S2","D+","x","R30\"","R descente"];

  let currentWeekOffset = 0;
  let weekData = {};

  function getMondayOfWeek(offset = 0) {
    const now = new Date();
    const day = now.getDay() || 7;
    const monday = new Date(now);
    monday.setDate(now.getDate() - day + 1 + offset * 7);
    monday.setHours(0,0,0,0);
    return monday;
  }
  function getWeekKey(monday) { return monday.toISOString().split('T')[0]; }
  function formatDate(d) { return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' }); }
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 3000);
  }

  function typeOptions(selected) {
    return TYPES.map(t => `<option value="${t.value}" ${t.value === selected ? 'selected' : ''}>${t.label}</option>`).join('');
  }

  function renderPlanBlock(dayIndex, planIndex, plan = {}) {
    const type = plan.type || 'repos';
    const contenu = plan.contenu || '';
    const location = plan.location || '';
    const shortcuts = ABBREVS.map(a =>
      `<span class="shortcut" onclick="insertAbbrev(${dayIndex},${planIndex},'${a}')">${a}</span>`
    ).join('');
    const removeBtnHtml = planIndex > 0
      ? `<button class="btn-remove-plan" onclick="removePlan(${dayIndex},${planIndex})">✕ Supprimer</button>`
      : '';
    return `
      <div class="plan-block" id="plan-${dayIndex}-${planIndex}">
        ${removeBtnHtml}
        <div class="plan-block-header">
          <select class="select-type" onchange="updatePlanField(${dayIndex},${planIndex},'type',this.value)">
            ${typeOptions(type)}
          </select>
          <input type="text" class="input-location" placeholder="📍 Lieu (ex: Élancourt)"
            value="${location}"
            oninput="updatePlanField(${dayIndex},${planIndex},'location',this.value)">
        </div>
        <textarea id="ta-${dayIndex}-${planIndex}" placeholder="Détail de la séance..."
          oninput="updatePlanField(${dayIndex},${planIndex},'contenu',this.value)">${contenu}</textarea>
        <div class="shortcuts">${shortcuts}</div>
      </div>`;
  }

  function renderDay(i, date, plans) {
    const today = new Date(); today.setHours(0,0,0,0);
    const isToday = date.getTime() === today.getTime();
    let plansHtml = plans.map((p, pi) => renderPlanBlock(i, pi, p)).join('');
    return `
      <div class="day-row ${isToday ? 'today-row' : ''}" id="day-row-${i}">
        <div class="day-label">
          <div class="dname">${JOURS[i]}</div>
          <div class="ddate">${date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
        </div>
        <div class="plans-container" id="plans-${i}">
          ${plansHtml}
          <button class="btn-add-plan" onclick="addPlan(${i})">+ Ajouter un 2ème plan (ex: autre commune)</button>
        </div>
      </div>`;
  }

  async function renderWeek() {
    const monday = getMondayOfWeek(currentWeekOffset);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    const weekKey = getWeekKey(monday);
    const today = new Date(); today.setHours(0,0,0,0);

    document.getElementById('week-label').textContent =
      currentWeekOffset === 0 ? 'Cette semaine' :
      currentWeekOffset === -1 ? 'Semaine dernière' :
      currentWeekOffset === 1 ? 'Semaine prochaine' :
      `Semaine du ${formatDate(monday)}`;
    document.getElementById('week-dates').textContent = `${formatDate(monday)} – ${formatDate(sunday)}`;

    const snap = await getDoc(doc(db, "plannings", weekKey));
    weekData = snap.exists() ? snap.data() : {};
    const jours = weekData.jours || Array(7).fill(null).map(() => ({ plans: [{ type: 'repos', contenu: '', location: '' }] }));
    const published = weekData.published || false;
    const updatedAt = weekData.updatedAt?.toDate();

    // Normalise les anciens formats
    const normalizedJours = jours.map(j => {
      if (!j) return { plans: [{ type: 'repos', contenu: '', location: '' }] };
      if (!j.plans) return { plans: [{ type: j.type || 'repos', contenu: j.contenu || '', location: '' }] };
      return j;
    });
    weekData.jours = normalizedJours;

    const badge = document.getElementById('status-badge');
    const notice = document.getElementById('draft-notice');
    const btnUnpub = document.getElementById('btn-unpub');
    if (published) {
      badge.className = 'status-badge status-published'; badge.textContent = '● Publié';
      notice.style.display = 'none'; btnUnpub.style.display = 'block';
    } else if (snap.exists()) {
      badge.className = 'status-badge status-draft'; badge.textContent = '● Brouillon';
      notice.style.display = 'block'; btnUnpub.style.display = 'none';
    } else {
      badge.className = 'status-badge status-empty'; badge.textContent = '● Vide';
      notice.style.display = 'none'; btnUnpub.style.display = 'none';
    }
    document.getElementById('last-update').textContent = updatedAt
      ? `Modifié le ${updatedAt.toLocaleString('fr-FR')}` : '';

    let html = '';
    for (let i = 0; i < 7; i++) {
      const date = new Date(monday); date.setDate(monday.getDate() + i);
      html += renderDay(i, date, normalizedJours[i].plans);
    }
    document.getElementById('days-list').innerHTML = html;
  }

  window.updatePlanField = (dayIndex, planIndex, field, value) => {
    if (!weekData.jours) return;
    weekData.jours[dayIndex].plans[planIndex][field] = value;
  };

  window.addPlan = (dayIndex) => {
    if (!weekData.jours) return;
    const plans = weekData.jours[dayIndex].plans;
    plans.push({ type: 'repos', contenu: '', location: '' });
    const container = document.getElementById(`plans-${dayIndex}`);
    const btn = container.querySelector('.btn-add-plan');
    const newBlock = document.createElement('div');
    newBlock.innerHTML = renderPlanBlock(dayIndex, plans.length - 1, plans[plans.length - 1]);
    container.insertBefore(newBlock.firstElementChild, btn);
  };

  window.removePlan = (dayIndex, planIndex) => {
    if (!weekData.jours) return;
    weekData.jours[dayIndex].plans.splice(planIndex, 1);
    const monday = getMondayOfWeek(currentWeekOffset);
    const date = new Date(monday); date.setDate(monday.getDate() + dayIndex);
    const container = document.getElementById(`plans-${dayIndex}`);
    const btn = container.querySelector('.btn-add-plan');
    container.innerHTML = weekData.jours[dayIndex].plans
      .map((p, pi) => renderPlanBlock(dayIndex, pi, p)).join('');
    container.appendChild(btn);
  };

  window.insertAbbrev = (dayIndex, planIndex, abbrev) => {
    const ta = document.getElementById(`ta-${dayIndex}-${planIndex}`);
    if (!ta) return;
    const s = ta.selectionStart, e = ta.selectionEnd;
    ta.value = ta.value.slice(0,s) + abbrev + ta.value.slice(e);
    if (weekData.jours) weekData.jours[dayIndex].plans[planIndex].contenu = ta.value;
    ta.focus(); ta.selectionStart = ta.selectionEnd = s + abbrev.length;
  };

  async function save(published) {
    const weekKey = getWeekKey(getMondayOfWeek(currentWeekOffset));
    try {
      await setDoc(doc(db, "plannings", weekKey), {
        jours: weekData.jours, published, updatedAt: serverTimestamp()
      });
      return true;
    } catch(e) { showToast('Erreur lors de la sauvegarde', true); return false; }
  }

  window.saveDraft = async () => {
    if (await save(false)) { showToast('💾 Brouillon enregistré — invisible pour les adhérents'); renderWeek(); }
  };
  window.publish = async () => {
    const btn = document.getElementById('btn-pub');
    btn.disabled = true; btn.textContent = 'Publication...';
    if (await save(true)) { showToast('✓ Planning publié ! Les adhérents peuvent le voir.'); renderWeek(); }
    btn.disabled = false; btn.textContent = '📤 Publier la semaine';
  };
  window.unpublish = async () => {
    if (await save(false)) { showToast('🔒 Planning dépublié — plus visible pour les adhérents'); renderWeek(); }
  };
  window.changeWeek = (dir) => { currentWeekOffset += dir; renderWeek(); };
  window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists() || snap.data().role !== 'admin') { window.location.href = 'planning.html'; return; }
    renderWeek();
  });
</script>
</body>
</html>
