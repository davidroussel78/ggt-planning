<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGT — Plan de course</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a23; --surface2: #1e2330;
    --border: rgba(255,255,255,0.08); --text: #e8eaf0;
    --muted: #7a8099; --accent: #4f8ef7; --orange: #fc4c02;
    --green: #22c55e; --amber: #f59e0b;
  }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--text);
    background-image: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(79,142,247,0.06) 0%, transparent 60%);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 0.5px solid var(--border);
    background: rgba(22,26,35,0.9); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10; flex-wrap: wrap; gap: 8px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; border-radius: 9px; overflow: hidden; }
  .logo-icon img { width: 36px; height: 36px; object-fit: contain; }
  .logo h1 { font-size: 16px; font-weight: 600; }
  .logo p { font-size: 11px; color: var(--muted); }
  .btn-head {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 6px 12px; color: var(--muted);
    font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer;
    transition: color 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-head:hover { color: var(--text); border-color: var(--accent); }

  .main { max-width: 1300px; margin: 0 auto; padding: 20px; }

  /* CHOIX PLAN */
  .plan-chooser {
    display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;
  }
  .plan-chooser label { font-size: 13px; color: var(--muted); margin-right: 4px; }
  .plan-btn {
    padding: 8px 20px; border-radius: 10px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
    transition: all 0.2s;
  }
  .plan-btn:hover { border-color: var(--accent); color: var(--text); }
  .plan-btn.active-a { background: rgba(252,76,2,0.15); border-color: var(--orange); color: var(--orange); }
  .plan-btn.active-b { background: rgba(79,142,247,0.15); border-color: var(--accent); color: var(--accent); }
  .plan-btn.active-c { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .plan-desc { font-size: 12px; color: var(--muted); padding: 6px 12px; background: var(--surface); border-radius: 8px; border: 0.5px solid var(--border); }

  /* PHASES */
  .phase-block { margin-bottom: 32px; }
  .phase-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-radius: 12px; margin-bottom: 14px;
    border: 0.5px solid var(--border);
  }
  .phase-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .phase-title { font-size: 15px; font-weight: 600; }
  .phase-period { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* SEMAINES */
  .week-block { margin-bottom: 16px; }
  .week-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--surface); border-radius: 10px 10px 0 0;
    border: 0.5px solid var(--border); border-bottom: none;
  }
  .week-num { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 0.06em; text-transform: uppercase; }
  .week-title { font-size: 13px; color: var(--text); }

  /* GRILLE JOURS */
  .week-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 0.5px solid var(--border); border-radius: 0 0 10px 10px; overflow: hidden;
  }
  .day-col { border-right: 0.5px solid var(--border); }
  .day-col:last-child { border-right: none; }
  .day-head {
    background: var(--surface2); padding: 6px 8px; text-align: center;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); border-bottom: 0.5px solid var(--border);
  }
  .day-cell {
    background: var(--surface); padding: 8px; font-size: 11px;
    color: #a8b0c8; line-height: 1.5; white-space: pre-line; min-height: 60px;
  }
  .day-cell.repos { color: rgba(122,128,153,0.4); font-style: italic; }
  .day-cell.course { background: rgba(252,76,2,0.08); color: #fc7c42; font-weight: 600; }
  .day-cell.recup { background: rgba(79,142,247,0.06); }

  /* NOTE COACHDAV */
  .week-note {
    font-size: 11px; color: var(--muted); padding: 8px 14px;
    background: rgba(252,76,2,0.04); border: 0.5px solid var(--border);
    border-top: none; border-radius: 0 0 10px 10px; line-height: 1.6;
  }

  /* SUIVI */
  .suivi-section { margin-top: 32px; }
  .suivi-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }

  /* Vue adhérent : saisie par semaine */
  .suivi-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;
    margin-bottom: 12px;
  }
  .suivi-day {
    border-right: 0.5px solid var(--border); background: var(--surface);
  }
  .suivi-day:last-child { border-right: none; }
  .suivi-day-head {
    background: var(--surface2); padding: 6px 4px; text-align: center;
    font-size: 10px; font-weight: 700; color: var(--muted);
    border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .suivi-day-body { padding: 6px 4px; }
  .suivi-select {
    width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 5px; padding: 4px 2px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 10px; outline: none; margin-bottom: 4px;
    cursor: pointer;
  }
  .suivi-input {
    width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 5px; padding: 4px 5px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 10px; outline: none; margin-bottom: 3px;
  }
  .suivi-input::placeholder { color: var(--muted); }
  .btn-save-suivi {
    padding: 7px 18px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff;
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s; margin-top: 6px;
  }
  .btn-save-suivi:hover { opacity: 0.9; }
  .cumul-bar {
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 12px; color: var(--muted); margin-top: 6px;
    display: flex; gap: 20px;
  }
  .cumul-bar strong { color: var(--text); }

  /* Vue CoachDav : tableau récap */
  .recap-table-wrap { overflow-x: auto; border-radius: 10px; border: 0.5px solid var(--border); margin-bottom: 20px; }
  .recap-table { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--surface); min-width: 800px; }
  .recap-table th {
    background: var(--surface2); color: var(--muted); font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 10px; text-align: center;
    border-bottom: 0.5px solid var(--border); white-space: nowrap;
  }
  .recap-table td { padding: 7px 10px; text-align: center; border-bottom: 0.5px solid rgba(255,255,255,0.04); color: var(--text); }
  .recap-table tr:last-child td { border-bottom: none; }
  .recap-table .td-name { text-align: left; font-weight: 600; color: var(--text); }
  .recap-table .td-plan { color: var(--accent); font-size: 10px; font-weight: 600; }
  .emoji-cell { font-size: 14px; }

  .tab-btns { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    padding: 7px 16px; border-radius: 8px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 13px; transition: all 0.2s;
  }
  .tab-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 0.5px solid rgba(34,197,94,0.4);
    border-radius: 10px; padding: 12px 20px; font-size: 13px; color: var(--green);
    transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(224,0,32,0.4); color: #ff6b6b; }

  @media (max-width: 800px) {
    .week-grid, .suivi-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>

const JOURS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const SENSATIONS = [
  { val: '', label: '— Repos' },
  { val: '😊', label: '😊 Très facile' },
  { val: '🙂', label: '🙂 Facile' },
  { val: '😐', label: '😐 Normal' },
  { val: '😓', label: '😓 Difficile' },
  { val: '😰', label: '😰 Très difficile' },
];

const PLAN_DESCS = {
  'A': '🏔 Plan A — ½ Barjo 50km / 1200m D+ · 21 juin 2026',
  'B': '🏃 Plan B — Trail des Tours 28km / 300m D+ · 31 mai 2026',
  'C': '🎯 Plan C — Trail des Tours 15km / 120m D+ · 31 mai 2026',
};

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (isError?' error':'');
  setTimeout(()=>t.className='toast'+(isError?' error':''), 3000);
}

function getDayClass(text) {
  if (!text || text === 'Repos' || text.toLowerCase() === 'repos') return 'repos';
  if (text.includes('BARJO') || text.includes('Trail des Tours') || text.includes('🎯') || text.includes('🏆')) return 'course';
  if (text.includes('Récupération') || text.includes('récup') || text.includes('Repos complet')) return 'recup';
  return '';
}

function buildPlanHTML(plan) {
  let html = '';
  const phaseColors = {
    'PHASE 1 — FONCIER': '#22c55e',
    'PHASE 2 — DÉVELOPPEMENT': '#f59e0b',
    'PHASE 3 — TRAIL DES TOURS': '#4f8ef7',
    'PHASE 4 — BARJO (Plan A)': '#fc4c02',
  };

  for (const [phaseName, phaseObj] of Object.entries(PLAN_DATA)) {
    // Phase 4 seulement pour Plan A
    if (phaseName.includes('BARJO') && plan !== 'A') continue;

    const color = phaseColors[phaseName] || '#4f8ef7';
    html += `<div class="phase-block">
      <div class="phase-header" style="background:rgba(${hexToRgb(color)},0.06);border-color:rgba(${hexToRgb(color)},0.2)">
        <div class="phase-dot" style="background:${color}"></div>
        <span class="phase-title">${phaseObj.info.label}</span>
        <span class="phase-period">${phaseObj.info.period}</span>
      </div>`;

    for (const week of phaseObj.weeks) {
      const days = plan === 'A' ? week.planA : week.planBC;
      html += `<div class="week-block">
        <div class="week-header">
          <span class="week-num">${week.num}</span>
          <span class="week-title">${week.title}</span>
        </div>
        <div class="week-grid">`;

      for (let i = 0; i < 7; i++) {
        const dateStr = week.dates[i] || '';
        const content = days[i] || 'Repos';
        const cls = getDayClass(content);
        html += `<div class="day-col">
          <div class="day-head">${JOURS[i]}<br><span style="font-size:9px;font-weight:400;opacity:0.7">${dateStr}</span></div>
          <div class="day-cell ${cls}">${content}</div>
        </div>`;
      }

      html += `</div>`;
      if (week.note) {
        html += `<div class="week-note">${week.note}</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
  }
  return html;
}

function buildSuiviHTML(plan, savedData) {
  let html = `<p style="font-size:13px;color:var(--muted);margin-bottom:16px;">
    Remplis tes sensations, distance et D+ après chaque séance. Tes données sont sauvegardées automatiquement.
  </p>`;

  let weekNum = 0;
  for (const [phaseName, phaseObj] of Object.entries(PLAN_DATA)) {
    if (phaseName.includes('BARJO') && plan !== 'A') continue;
    for (const week of phaseObj.weeks) {
      weekNum++;
      const wKey = `week_${week.num || weekNum}`;
      let cumKm = 0, cumDp = 0;
      for (let i = 0; i < 7; i++) {
        cumKm += parseFloat(savedData[`km_${wKey}_${i}`] || 0);
        cumDp += parseFloat(savedData[`dp_${wKey}_${i}`] || 0);
      }

      html += `<div style="margin-bottom:20px;">
        <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;padding:6px 10px;background:var(--surface);border-radius:8px;">
          ${week.num} — ${week.title}
        </div>
        <div class="suivi-grid">`;

      for (let i = 0; i < 7; i++) {
        const dateStr = week.dates[i] || JOURS[i];
        const sens = savedData[`sens_${wKey}_${i}`] || '';
        const km = savedData[`km_${wKey}_${i}`] || '';
        const dp = savedData[`dp_${wKey}_${i}`] || '';
        const opts = SENSATIONS.map(s => `<option value="${s.val}" ${s.val===sens?'selected':''}>${s.label}</option>`).join('');

        html += `<div class="suivi-day">
          <div class="suivi-day-head">${JOURS[i]}<br><span style="font-size:8px;opacity:0.7">${dateStr}</span></div>
          <div class="suivi-day-body">
            <select class="suivi-select" id="sens_${wKey}_${i}">${opts}</select>
            <input class="suivi-input" type="number" step="0.1" min="0" placeholder="km" id="km_${wKey}_${i}" value="${km}">
            <input class="suivi-input" type="number" step="10" min="0" placeholder="D+" id="dp_${wKey}_${i}" value="${dp}">
          </div>
        </div>`;
      }

      html += `</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
          <div class="cumul-bar">
            Cumul semaine : <strong>${cumKm.toFixed(1)} km</strong> · <strong>${Math.round(cumDp)} m D+</strong>
          </div>
          <button class="btn-save-suivi" onclick="saveSuivi('${wKey}', ${weekNum-1})">💾 Sauvegarder</button>
        </div>`;
      html += `</div>`;
    }
  }
  return html;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

window._choosePlan = async function(plan) {
  currentPlan = plan;
  document.querySelectorAll('.plan-btn').forEach(b => b.className = 'plan-btn');
  const cls = plan === 'A' ? 'active-a' : plan === 'B' ? 'active-b' : 'active-c';
  document.getElementById('btn-' + plan.toLowerCase()).classList.add(cls);
  document.getElementById('plan-desc').textContent = PLAN_DESCS[plan];

  // Afficher le plan immédiatement sans attendre Firebase
  document.getElementById('plan-content').innerHTML = buildPlanHTML(plan);

  // Charger données suivi depuis Firebase
  let savedData = {};
  if (currentUid) {
    try {
      const snap = await getDoc(doc(db, 'suivi_course', currentUid));
      if (snap.exists()) savedData = snap.data();
    } catch(e) {}
  }
  document.getElementById('suivi-content').innerHTML = buildSuiviHTML(plan, savedData);

  // Sauvegarder le choix dans suivi_course (accessible à tous les adhérents)
  if (currentUid) {
    try {
      await setDoc(doc(db, 'suivi_course', currentUid), { _plan_choice: plan }, { merge: true });
    } catch(e) {}
  }
};

window._saveSuivi = async function(wKey, weekIdx) {
  if (!currentUid) return;
  const data = {};
  for (let i = 0; i < 7; i++) {
    data[`sens_${wKey}_${i}`] = document.getElementById(`sens_${wKey}_${i}`)?.value || '';
    data[`km_${wKey}_${i}`] = document.getElementById(`km_${wKey}_${i}`)?.value || '';
    data[`dp_${wKey}_${i}`] = document.getElementById(`dp_${wKey}_${i}`)?.value || '';
  }
  // Recalculer cumul
  let cumKm = 0, cumDp = 0;
  for (let i = 0; i < 7; i++) {
    cumKm += parseFloat(data[`km_${wKey}_${i}`] || 0);
    cumDp += parseFloat(data[`dp_${wKey}_${i}`] || 0);
  }
  data[`cumul_km_${wKey}`] = cumKm.toFixed(1);
  data[`cumul_dp_${wKey}`] = Math.round(cumDp);

  try {
    await setDoc(doc(db, 'suivi_course', currentUid), data, { merge: true });
    showToast('✓ Suivi sauvegardé !');
  } catch(e) { showToast('Erreur de sauvegarde', true); }
};

window._loadRecap = async function() {
  if (!isAdmin) return;
  const recapDiv = document.getElementById('recap-content');
  recapDiv.innerHTML = '<p style="color:var(--muted);font-size:13px;">Chargement...</p>';

  try {
    // Récupérer tous les utilisateurs
    const usersSnap = await getDocs(collection(db, 'users'));
    const users = [];
    usersSnap.forEach(d => {
      const data = d.data();
      if (data.role !== 'admin') {
        users.push({ uid: d.id, prenom: data.prenom || '', nom: data.nom || '', plan: data.plan_course || '?' });
      }
    });

    if (!users.length) {
      recapDiv.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:20px 0;">Aucun adhérent enregistré.</p>';
      return;
    }

    // Récupérer tous les suivis
    const suivis = {};
    for (const u of users) {
      try {
        const snap = await getDoc(doc(db, 'suivi_course', u.uid));
        suivis[u.uid] = snap.exists() ? snap.data() : {};
      } catch(e) { suivis[u.uid] = {}; }
    }

    // Construire tableau récap par semaine
    let html = '';
    let weekNum = 0;
    for (const [phaseName, phaseObj] of Object.entries(PLAN_DATA)) {
      html += `<h3 style="font-size:13px;color:var(--muted);margin:20px 0 10px;text-transform:uppercase;letter-spacing:0.06em;">${phaseObj.info.label}</h3>`;

      for (const week of phaseObj.weeks) {
        weekNum++;
        const wKey = `week_${week.num || weekNum}`;

        html += `<div class="recap-table-wrap" style="margin-bottom:16px;">
          <table class="recap-table">
            <thead>
              <tr>
                <th style="text-align:left">Adhérent</th>
                <th>Plan</th>
                ${''.concat(...JOURS.map((j,i) => `<th>${j}<br><span style="font-weight:400;opacity:0.7;font-size:9px">${week.dates[i]||''}</span></th>`))}
                <th>Cumul km</th>
                <th>Cumul D+</th>
              </tr>
            </thead>
            <tbody>`;

        for (const u of users) {
          const sd = suivis[u.uid] || {};
          const planLabel = u.plan === 'A' ? '<span style="color:#fc4c02">A</span>' : u.plan === 'B' ? '<span style="color:#4f8ef7">B</span>' : u.plan === 'C' ? '<span style="color:#22c55e">C</span>' : '?';
          const cumKm = sd[`cumul_km_${wKey}`] || '0';
          const cumDp = sd[`cumul_dp_${wKey}`] || '0';

          html += `<tr>
            <td class="td-name">${u.prenom} ${u.nom}</td>
            <td class="td-plan">${planLabel}</td>`;

          for (let i = 0; i < 7; i++) {
            const sens = sd[`sens_${wKey}_${i}`] || '';
            const km = sd[`km_${wKey}_${i}`] || '';
            const dp = sd[`dp_${wKey}_${i}`] || '';
            const title = [sens, km ? km+'km' : '', dp ? dp+'D+' : ''].filter(Boolean).join(' · ');
            html += `<td title="${title}" style="cursor:default">
              <div class="emoji-cell">${sens || '—'}</div>
              ${km ? `<div style="font-size:10px;color:var(--muted)">${km}km</div>` : ''}
            </td>`;
          }

          html += `<td style="color:var(--accent);font-weight:600">${cumKm} km</td>
            <td style="color:var(--muted)">${cumDp} m</td>
          </tr>`;
        }

        html += `</tbody></table></div>`;
      }
    }
    recapDiv.innerHTML = html;
  } catch(e) {
    recapDiv.innerHTML = '<p style="color:#ff6b6b;font-size:13px;">Erreur de chargement.</p>';
  }
};

window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');

let redirecting = false;
onAuthStateChanged(auth, async (user) => {
  if (redirecting) return;
  if (!user) { redirecting = true; window.location.href = 'index.html'; return; }
  currentUid = user.uid;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    const data = snap.exists() ? snap.data() : {};
    const prenom = data.prenom || '';
    const nom = data.nom || '';
    document.getElementById('user-name').textContent = [prenom, nom].filter(Boolean).join(' ') || user.email;
    isAdmin = data.role === 'admin';
    if (isAdmin) document.getElementById('btn-recap').style.display = 'block';
    // Lire le plan depuis suivi_course (accessible à tous les adhérents)
    let planChoisi = data.plan_course || null;
    try {
      const scSnap = await getDoc(doc(db, 'suivi_course', user.uid));
      if (scSnap.exists() && scSnap.data()._plan_choice) {
        planChoisi = scSnap.data()._plan_choice;
      }
    } catch(e2) {}
    if (planChoisi) {
      window._choosePlan(planChoisi);
    }
  } catch(e) { console.error(e); }
});
