<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GGT — Plans de compétition</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<!-- SheetJS pour lire les fichiers Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surf:#161a23;--surf2:#1e2330;--brd:rgba(255,255,255,.08);--txt:#e8eaf0;--mut:#7a8099;--acc:#4f8ef7;--ora:#fc4c02;--grn:#22c55e;--amb:#f59e0b;--red:#ef4444}
html,body{min-height:100%}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);background-image:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(79,142,247,.06),transparent 60%)}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:.5px solid var(--brd);background:rgba(22,26,35,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:36px;height:36px;border-radius:9px;object-fit:contain}
.logo h1{font-size:16px;font-weight:600}
.logo p{font-size:11px;color:var(--mut)}
.btn-h{background:var(--surf2);border:.5px solid var(--brd);border-radius:8px;padding:6px 12px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .2s,border-color .2s}
.btn-h:hover{color:var(--txt);border-color:var(--acc)}
.btn-primary{background:var(--acc);border:none;border-radius:8px;padding:8px 18px;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(--red);border:none;border-radius:8px;padding:6px 14px;color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-danger:hover{opacity:.9}
.btn-success{background:var(--grn);border:none;border-radius:8px;padding:8px 18px;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-success:hover{opacity:.9}
.btn-warn{background:var(--amb);border:none;border-radius:8px;padding:6px 14px;color:#000;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.main{max-width:1300px;margin:0 auto;padding:20px}

/* ONGLETS PRINCIPAUX */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tbtn{padding:7px 16px;border-radius:8px;border:.5px solid var(--brd);background:var(--surf);color:var(--mut);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.tbtn.on{background:var(--surf2);border-color:var(--acc);color:var(--txt)}
.tpan{display:none}
.tpan.on{display:block}

/* LISTE DES COMPÉTITIONS */
.comp-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
.comp-card{background:var(--surf);border:.5px solid var(--brd);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .2s,background .2s}
.comp-card:hover{border-color:var(--acc);background:var(--surf2)}
.comp-card.selected{border-color:var(--acc);background:var(--surf2)}
.comp-card-name{font-size:15px;font-weight:600;margin-bottom:4px}
.comp-card-date{font-size:12px;color:var(--ora);margin-bottom:8px}
.comp-card-meta{font-size:11px;color:var(--mut);display:flex;gap:12px;flex-wrap:wrap}
.comp-card-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-pub{background:rgba(34,197,94,.15);color:var(--grn)}
.badge-draft{background:rgba(245,158,11,.15);color:var(--amb)}
.badge-arch{background:rgba(122,128,153,.15);color:var(--mut)}
.comp-card-dists{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.dist-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;border:.5px solid var(--brd)}

/* CHOIX DISTANCE */
.dist-chooser{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.dist-chooser label{font-size:13px;color:var(--mut)}
.dbtn{padding:8px 20px;border-radius:10px;border:.5px solid var(--brd);background:var(--surf);color:var(--mut);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.dbtn:hover{border-color:var(--acc);color:var(--txt)}
.dbtn.on{background:rgba(79,142,247,.15);border-color:var(--acc);color:var(--acc)}

/* PLAN */
.ph-block{margin-bottom:24px}
.ph-head{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;margin-bottom:10px;border:.5px solid var(--brd)}
.ph-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ph-title{font-size:14px;font-weight:600}
.ph-period{font-size:11px;color:var(--mut);margin-left:auto}
.wk-block{margin-bottom:12px}
.wk-head{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--surf);border-radius:8px 8px 0 0;border:.5px solid var(--brd);border-bottom:none}
.wk-num{font-size:10px;font-weight:700;color:var(--ora);letter-spacing:.06em;text-transform:uppercase}
.wk-title{font-size:12px;color:var(--txt)}
.wk-dates{font-size:10px;color:var(--mut);margin-left:auto}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);border:.5px solid var(--brd);border-radius:0 0 8px 8px;overflow:hidden}
.dc{border-right:.5px solid var(--brd)}
.dc:last-child{border-right:none}
.dh{background:var(--surf2);padding:5px 6px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);border-bottom:.5px solid var(--brd)}
.dh span{font-size:8px;opacity:.6;font-weight:400;display:block}
.dcell{background:var(--surf);padding:7px;font-size:11px;color:#a8b0c8;line-height:1.5;white-space:pre-line;min-height:55px}
.dcell.repos{color:rgba(122,128,153,.35);font-style:italic}
.dcell.course{background:rgba(252,76,2,.08);color:#fc7c42;font-weight:600}
.dcell.recup{background:rgba(79,142,247,.05)}

/* SUIVI */
.sv-wrap{margin-bottom:18px}
.sv-wktitle{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px;padding:6px 10px;background:var(--surf);border-radius:8px}
.sv-grid{display:grid;grid-template-columns:repeat(7,1fr);border:.5px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:6px}
.sv-day{border-right:.5px solid var(--brd);background:var(--surf)}
.sv-day:last-child{border-right:none}
.sv-dh{background:var(--surf2);padding:5px 3px;text-align:center;font-size:9px;font-weight:700;color:var(--mut);border-bottom:.5px solid var(--brd);text-transform:uppercase}
.sv-dh span{font-size:7px;opacity:.6;font-weight:400;display:block}
.sv-db{padding:5px 3px}
.sv-sel{width:100%;background:var(--surf2);border:.5px solid var(--brd);border-radius:4px;padding:3px 2px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:10px;outline:none;margin-bottom:3px;cursor:pointer}
.sv-inp{width:100%;background:var(--surf2);border:.5px solid var(--brd);border-radius:4px;padding:3px 4px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:10px;outline:none;margin-bottom:2px}
.sv-inp::placeholder{color:var(--mut)}
.sv-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.cumul{background:var(--surf);border:.5px solid var(--brd);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--mut)}
.cumul strong{color:var(--txt)}
.btn-sv{padding:6px 16px;border-radius:7px;border:none;background:var(--acc);color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.cumul-total{margin-top:14px;padding:14px 18px;background:var(--surf2);border-radius:10px;border:.5px solid var(--brd);display:flex;gap:30px;align-items:center}
.cumul-total span{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.cumul-total .val-km{font-size:16px;font-weight:700;color:var(--acc)}
.cumul-total .val-dp{font-size:16px;font-weight:700;color:var(--grn)}

/* RECAP ADMIN */
.rtw{overflow-x:auto;border-radius:8px;border:.5px solid var(--brd);margin-bottom:14px}
.rt{width:100%;border-collapse:collapse;font-size:12px;background:var(--surf);min-width:700px}
.rt th{background:var(--surf2);color:var(--mut);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px;text-align:center;border-bottom:.5px solid var(--brd);white-space:nowrap}
.rt td{padding:6px 8px;text-align:center;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--txt)}
.rt tr:last-child td{border-bottom:none}
.tdn{text-align:left!important;font-weight:600}

/* ADMIN — UPLOAD */
.upload-zone{border:2px dashed var(--brd);border-radius:14px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px}
.upload-zone:hover{border-color:var(--acc);background:rgba(79,142,247,.04)}
.upload-zone.dragover{border-color:var(--acc);background:rgba(79,142,247,.08)}
.upload-icon{font-size:40px;margin-bottom:12px}
.upload-title{font-size:15px;font-weight:600;margin-bottom:6px}
.upload-hint{font-size:12px;color:var(--mut)}
#file-input{display:none}

/* APERÇU IMPORT */
.preview-card{background:var(--surf);border:.5px solid rgba(34,197,94,.3);border-radius:14px;padding:20px;margin-bottom:20px}
.preview-title{font-size:14px;font-weight:600;color:var(--grn);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.preview-item{background:var(--surf2);border-radius:8px;padding:10px}
.preview-item label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);display:block;margin-bottom:4px}
.preview-item span{font-size:13px;color:var(--txt)}
.preview-dists{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.preview-weeks{font-size:12px;color:var(--mut);margin-bottom:14px}
.preview-actions{display:flex;gap:10px;flex-wrap:wrap}

/* LISTE ADMIN */
.admin-comp-item{background:var(--surf);border:.5px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.admin-comp-info{flex:1;min-width:200px}
.admin-comp-name{font-size:14px;font-weight:600}
.admin-comp-meta{font-size:12px;color:var(--mut);margin-top:3px}
.admin-comp-actions{display:flex;gap:8px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surf2);border:.5px solid rgba(34,197,94,.4);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--grn);transition:transform .3s;z-index:100;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(224,0,32,.4);color:#ff6b6b}
.toast.warn{border-color:rgba(245,158,11,.4);color:var(--amb)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:160px;color:var(--mut);font-size:14px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* VIDE */
.empty{text-align:center;padding:50px 20px;color:var(--mut)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty p{font-size:14px}

/* MODAL CONFIRMATION */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surf);border:.5px solid var(--brd);border-radius:16px;padding:28px;max-width:420px;width:90%}
.modal-title{font-size:16px;font-weight:600;margin-bottom:10px}
.modal-body{font-size:13px;color:var(--mut);margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

@media(max-width:800px){.wk-grid,.sv-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

  const DIST_COLORS = ['#fc4c02','#4f8ef7','#22c55e','#f59e0b'];

  // Formater une date en français lisible
  function formatDateFR(dateStr) {
    if (!dateStr) return '?';
    let d;
    // Si c'est déjà un objet Date sérialisé (ISO string)
    if (String(dateStr).includes('T') || String(dateStr).includes('GMT')) {
      d = new Date(dateStr);
    } else {
      // Format JJ/MM/AAAA
      const parts = String(dateStr).split('/');
      if (parts.length === 3) {
        d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
      } else {
        return dateStr;
      }
    }
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  }

  // ── Utilitaires ──
  function toast(msg, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type==='err'?' err':type==='warn'?' warn':'');
    setTimeout(()=>t.className='toast'+(type==='err'?' err':type==='warn'?' warn':''), 3500);
  }

  function dayClass(t) {
    if (!t||t.toLowerCase().startsWith('repos')) return 'repos';
    if (t.toLowerCase().includes('récup')) return 'recup';
    if (['🎯','🏆','course','compétition'].some(x=>t.toLowerCase().includes(x.toLowerCase()))) return 'course';
    return '';
  }

  // Calculer la date d'un lundi à partir de la date de début + offset semaines
  function getMondayDate(startDate, weekIndex) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + weekIndex * 7);
    return d;
  }

  function formatDate(d) {
    return d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
  }

  // ── Navigation ──
  window.switchMainTab = function(name) {
    ['mes-plans','admin'].forEach(n => {
      document.getElementById('p-'+n).className = 'tpan'+(n===name?' on':'');

    });
    if (name==='admin') loadAdminList();
  };

  // ── Construire le plan ──
  function buildPlan(comp, distIdx) {
    const dist = comp.distances[distIdx];
    const weeks = comp.semaines || [];
    const startDate = new Date(comp.date_debut_iso || Date.now());

    // Grouper par phase
    const phases = {};
    const phaseOrder = [];
    weeks.forEach((w, wi) => {
      if (!phases[w.phase]) { phases[w.phase] = []; phaseOrder.push(w.phase); }
      phases[w.phase].push({...w, weekIndex: wi});
    });

    let h = '';
    phaseOrder.forEach((pname, pi) => {
      const color = ['#22c55e','#f59e0b','#4f8ef7','#fc4c02'][pi % 4];
      const rgb = color.slice(1).match(/../g).map(x=>parseInt(x,16)).join(',');
      h += `<div class="ph-block">
        <div class="ph-head" style="background:rgba(${rgb},.06);border-color:rgba(${rgb},.25)">
          <div class="ph-dot" style="background:${color}"></div>
          <span class="ph-title">${pname}</span>
        </div>`;
      phases[pname].forEach(w => {
        const monday = getMondayDate(startDate, w.weekIndex);
        const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
        const days = w.distances[distIdx] || Array(7).fill('Repos');
        const dates = Array.from({length:7}, (_,i) => {
          const d = new Date(monday); d.setDate(monday.getDate()+i);
          return d.getDate()+'/'+(d.getMonth()+1);
        });
        h += `<div class="wk-block">
          <div class="wk-head">
            <span class="wk-num">${w.num}</span>
            <span class="wk-title">${w.titre}</span>
            <span class="wk-dates">${formatDate(monday)} → ${formatDate(sunday)}</span>
          </div>
          <div class="wk-grid">`;
        for (let i=0;i<7;i++) {
          const txt = days[i] || 'Repos';
          h += `<div class="dc"><div class="dh">${JOURS[i]}<span>${dates[i]}</span></div><div class="dcell ${dayClass(txt)}">${txt}</div></div>`;
        }
        h += `</div></div>`;
      });
      h += '</div>';
    });
    return h;
  }

  // ── Construire le suivi ──
  function buildSuivi(comp, distIdx, saved) {
    const weeks = comp.semaines || [];
    const startDate = new Date(comp.date_debut_iso || Date.now());
    let totalKm=0, totalDp=0;

    let h = '<p style="font-size:12px;color:var(--mut);margin-bottom:14px;">Remplis tes sensations après chaque séance puis clique Sauvegarder.</p>';

    weeks.forEach((w, wi) => {
      const wk = 'w_'+w.num;
      let cumKm=0, cumDp=0;
      for (let i=0;i<7;i++) {
        cumKm += parseFloat(saved[wk+'_km'+i]||0);
        cumDp  += parseFloat(saved[wk+'_dp'+i]||0);
      }
      totalKm += cumKm; totalDp += cumDp;
      const monday = getMondayDate(startDate, wi);
      const dates = Array.from({length:7}, (_,i) => {
        const d = new Date(monday); d.setDate(monday.getDate()+i);
        return d.getDate()+'/'+(d.getMonth()+1);
      });
      h += `<div class="sv-wrap"><div class="sv-wktitle">${w.num} — ${w.titre}</div><div class="sv-grid">`;
      for (let i=0;i<7;i++) {
        const sv=saved[wk+'_sens'+i]||'', km=saved[wk+'_km'+i]||'', dp=saved[wk+'_dp'+i]||'';
        const opts = SLBL.map((l,idx)=>`<option value="${SENS[idx]}" ${SENS[idx]===sv?'selected':''}>${l}</option>`).join('');
        h += `<div class="sv-day">
          <div class="sv-dh">${JOURS[i]}<span>${dates[i]}</span></div>
          <div class="sv-db">
            <select class="sv-sel" id="${wk}_sens${i}">${opts}</select>
            <input class="sv-inp" type="number" step="0.1" min="0" placeholder="km" id="${wk}_km${i}" value="${km}">
            <input class="sv-inp" type="number" step="10"  min="0" placeholder="D+" id="${wk}_dp${i}" value="${dp}">
          </div>
        </div>`;
      }
      h += `</div><div class="sv-foot">
        <div class="cumul">Cumul : <strong>${cumKm.toFixed(1)} km</strong> · <strong>${Math.round(cumDp)} m D+</strong></div>
        <button class="btn-sv" onclick="saveSuivi('${wk}')">💾 Sauvegarder</button>
      </div></div>`;
    });

    h += `<div class="cumul-total">
      <span>📊 Cumul total</span>
      <span class="val-km">${totalKm.toFixed(1)} km</span>
      <span class="val-dp">${Math.round(totalDp)} m D+</span>
    </div>`;
    return h;
  }

      data[wk+'_km'+i]   = document.getElementById(wk+'_km'+i)?.value||'';

  async function loadRecap() {
    if (!isAdmin || !currentComp) return;
    const div = document.getElementById('p-recap');
    div.innerHTML = '<div class="loading"><div class="spin"></div> Chargement...</div>';
    try {
      // Récupérer tous les users

      // Récupérer les suivis pour cette compétition

          }

      }

      if (!users.length) { div.innerHTML='<p style="color:var(--mut);font-size:13px;padding:20px 0">Aucun adhérent n&apos;a encore rempli son suivi.</p>'; return; }

      const weeks = currentComp.semaines||[];
      let html='';

      // Tableau par semaine
      weeks.forEach(w => {
        const wk='w_'+w.num;
        html+=`<h4 style="font-size:12px;color:var(--mut);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.05em">${w.num} — ${w.titre}</h4>`;
        html+=`<div class="rtw"><table class="rt"><thead><tr><th style="text-align:left">Adhérent</th><th>Distance</th>`;
        for (let i=0;i<7;i++) html+=`<th>${JOURS[i]}</th>`;
        html+=`<th>km</th><th>D+</th></tr></thead><tbody>`;
        users.forEach(u => {
          const sd=suivis[u.uid]||{};

          html+=`<tr><td class="tdn">${u.prenom} ${u.nom}</td><td style="color:${dc};font-weight:600;font-size:11px">${u.distLabel}</td>`;
          for (let i=0;i<7;i++) {
            const sens=sd[wk+'_sens'+i]||'', km=sd[wk+'_km'+i]||'', dp=sd[wk+'_dp'+i]||'';
            html+=`<td><div style="font-size:14px">${sens||'—'}</div>${km?`<div style="font-size:10px;color:var(--mut)">${km}km</div>`:''}${dp?`<div style="font-size:10px;color:var(--acc)">${dp}m</div>`:''}</td>`;
          }
          html+=`<td style="color:var(--acc);font-weight:600">${sd[wk+'_cumkm']||'0'}</td><td style="color:var(--mut)">${sd[wk+'_cumdp']||'0'}m</td></tr>`;
        });
        html+=`</tbody></table></div>`;
      });

      // Tableau cumul total
      html+=`<h4 style="font-size:12px;color:var(--mut);margin:20px 0 6px;text-transform:uppercase;letter-spacing:.05em">📊 Cumul total saison</h4>`;
      html+=`<div class="rtw"><table class="rt"><thead><tr><th style="text-align:left">Adhérent</th><th>Distance</th><th>Total km</th><th>Total D+</th></tr></thead><tbody>`;
      users.forEach(u => {
        const sd=suivis[u.uid]||{};
        let tkm=0, tdp=0;
        Object.keys(sd).forEach(k=>{ if(k.endsWith('_cumkm')) tkm+=parseFloat(sd[k]||0); if(k.endsWith('_cumdp')) tdp+=parseFloat(sd[k]||0); });
        const dc = u.dist!==null ? DIST_COLORS[u.dist] : 'var(--mut)';
        html+=`<tr><td class="tdn">${u.prenom} ${u.nom}</td><td style="color:${dc};font-weight:600;font-size:11px">${u.distLabel}</td><td style="color:var(--acc);font-weight:700;font-size:13px">${tkm.toFixed(1)} km</td><td style="color:var(--mut);font-weight:600">${Math.round(tdp)} m</td></tr>`;
      });
      html+=`</tbody></table></div>`;
      div.innerHTML=html;
    } catch(e) { div.innerHTML=`<p style="color:#ff6b6b;font-size:13px">Erreur : ${e.message}</p>`; }
  }

  function readExcel(file) {
    if (!file.name.endsWith('.xlsx')) { toast('Fichier .xlsx uniquement','err'); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
        parsedPlan = parseTemplate(wb);
        showPreview(parsedPlan);
      } catch(err) {
        toast('Erreur de lecture : '+err.message,'err');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function parseTemplate(wb) {
    // ── Lire INFOS COURSE ──
    const ws1 = wb.Sheets['INFOS COURSE'];
    if (!ws1) throw new Error('Feuille "INFOS COURSE" introuvable');

    const nom         = ws1['B5']?.v || '';
    const date_course = ws1['B6']?.v || '';
    const lieu        = ws1['B7']?.v || '';
    const notes       = ws1['B10']?.v || '';
    const nb_semaines = parseInt(ws1['B20']?.v) || 0;
    const date_debut  = ws1['B21']?.v || '';

    // Distances (B14 à B17 = label, C14 à C17 = dist brute)
    const distances = [];
    for (let r=14; r<=17; r++) {
      const label = ws1[`B${r}`]?.v;
      const dist  = ws1[`A${r}`]?.v;
      if (label && String(label).trim()) {
        distances.push({ dist: String(dist||'').trim(), label: String(label).trim() });
      }
    }

    if (!nom) throw new Error('Le nom de la course est manquant (cellule B5)');
    if (!distances.length) throw new Error('Aucune distance trouvée (cellules B14 à B17)');

    // Convertir date_debut en ISO
    let date_debut_iso = '';
    let date_debut_fr = String(date_debut||'');
    if (date_debut) {
      if (date_debut instanceof Date) {
        date_debut_iso = date_debut.toISOString().split('T')[0];
        const dd = date_debut;
        date_debut_fr = String(dd.getDate()).padStart(2,'0')+'/'+String(dd.getMonth()+1).padStart(2,'0')+'/'+dd.getFullYear();
      } else {
        const parts = String(date_debut).split('/');
        if (parts.length===3) {
          date_debut_iso = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
          date_debut_fr = String(date_debut);
        }
      }
    }
    // Normaliser date_course
    let date_course_fr = String(date_course||'');
    if (date_course instanceof Date) {
      date_course_fr = String(date_course.getDate()).padStart(2,'0')+'/'+String(date_course.getMonth()+1).padStart(2,'0')+'/'+date_course.getFullYear();
    }

    // ── Lire PLAN ──
    const ws2 = wb.Sheets['PLAN'];
    if (!ws2) throw new Error('Feuille "PLAN" introuvable');

    const rows = XLSX.utils.sheet_to_json(ws2, {header:1, defval:''});
    // Les données commencent à la ligne 4 (index 3)
    const dataRows = rows.slice(3).filter(r => {
      const a = String(r[0]||'').trim();
      // Garder uniquement les lignes dont col A = S1, S2, S3... etc
      return /^S\d+$/.test(a);
    }); // col A = numéro semaine

    // Grouper par numéro de semaine
    const weeksMap = {};
    const weekOrder = [];
    dataRows.forEach(r => {
      const num   = String(r[0]||'').trim();
      const phase = String(r[1]||'').trim();
      const titre = String(r[2]||'').trim();
      const dist  = String(r[3]||'').trim();
      const days  = [r[4],r[5],r[6],r[7],r[8],r[9],r[10]].map(d=>String(d||'Repos').trim());

      if (!num) return;
      if (!weeksMap[num]) {
        weeksMap[num] = { num, phase, titre, distances: {} };
        weekOrder.push(num);
      }
      // Trouver l'index de cette distance
      const distIdx = distances.findIndex(d => d.dist === dist || d.label.includes(dist) || dist.includes(d.dist));
      if (distIdx >= 0) weeksMap[num].distances[distIdx] = days;
    });

    const semaines = weekOrder.map(num => weeksMap[num]);

    return { nom, date_course: date_course_fr, lieu: String(lieu||''), notes: String(notes||''),
             nb_semaines, date_debut: date_debut_fr, date_debut_iso, distances, semaines,
             status: 'draft', created_at: new Date().toISOString() };
  }

  function showPreview(plan) {
    const area = document.getElementById('preview-area');
    const dists = plan.distances.map((d,i) =>
      `<span class="dist-pill" style="color:${DIST_COLORS[i]};border-color:${DIST_COLORS[i]}">${d.label}</span>`
    ).join('');
    area.innerHTML = `<div class="preview-card">
      <div class="preview-title">✅ Fichier lu avec succès — Vérifie les informations avant d'importer</div>
      <div class="preview-grid">
        <div class="preview-item"><label>Nom de la course</label><span>${plan.nom}</span></div>
        <div class="preview-item"><label>Date de la course</label><span>${plan.date_course}</span></div>
        <div class="preview-item"><label>Lieu</label><span>${plan.lieu||'—'}</span></div>
        <div class="preview-item"><label>Début du plan</label><span>${plan.date_debut}</span></div>
        <div class="preview-item"><label>Nb de semaines</label><span>${plan.semaines.length} semaines lues</span></div>
      </div>
      <div style="margin-bottom:10px;font-size:12px;color:var(--mut)">Distances :</div>
      <div class="preview-dists">${dists}</div>
      <div class="preview-weeks" style="margin-bottom:14px">
        Semaines lues : ${plan.semaines.map(w=>w.num).join(', ')}
      </div>
      ${plan.notes ? `<div style="font-size:12px;color:var(--mut);margin-bottom:14px;padding:10px;background:var(--surf2);border-radius:8px">💬 ${plan.notes}</div>` : ''}
      <div class="preview-actions">
        <button class="btn-success" onclick="importPlan('draft')">💾 Sauvegarder en brouillon</button>
        <button class="btn-primary" onclick="importPlan('published')">▶ Importer et publier directement</button>
        <button class="btn-h" onclick="cancelImport()">✕ Annuler</button>
      </div>
    </div>`;
    area.style.display = 'block';
    document.getElementById('upload-zone').style.display = 'none';
  }

  window.importPlan = async function(status) {
    if (!parsedPlan) return;
    parsedPlan.status = status;
    try {
      const id = 'plan_' + Date.now();
      await setDoc(doc(db,'race_plans',id), parsedPlan);
      toast(status==='published' ? '✓ Plan publié !' : '✓ Plan sauvegardé en brouillon !');
      parsedPlan = null;
      cancelImport();
      switchAdminTab('list');
      loadAdminList();
      loadComps();
    } catch(e) { toast('Erreur : '+e.message,'err'); }
  };

  window.cancelImport = function() {
    document.getElementById('preview-area').style.display = 'none';
    document.getElementById('preview-area').innerHTML = '';
    document.getElementById('upload-zone').style.display = 'block';
    document.getElementById('file-input').value = '';
    parsedPlan = null;
  };

  // ── Auth ──
  let redirecting = false;
  onAuthStateChanged(auth, async (user) => {
    if (redirecting) return;
    if (!user) { redirecting=true; window.location.href='index.html'; return; }
    currentUid = user.uid;
    const snap = await getDoc(doc(db,'users',currentUid));
    const data = snap.exists() ? snap.data() : {};
    document.getElementById('user-name').textContent = [data.prenom||'',data.nom||''].filter(Boolean).join(' ')||user.email;
    isAdmin = data.role==='admin';
    if (isAdmin) {
      document.getElementById('t-admin').style.display = 'block';
    }
    loadComps();
  });
</script>
</body>
</html>
