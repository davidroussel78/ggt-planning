<head>

<title>GGT — Plan de course 2026</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surf:#161a23;--surf2:#1e2330;--brd:rgba(255,255,255,.08);--txt:#e8eaf0;--mut:#7a8099;--acc:#4f8ef7;--ora:#fc4c02;--grn:#22c55e;--amb:#f59e0b}
html,body{min-height:100%}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);background-image:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(79,142,247,.06),transparent 60%)}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:.5px solid var(--brd);background:rgba(22,26,35,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:36px;height:36px;border-radius:9px;object-fit:contain}
.logo h1{font-size:16px;font-weight:600}
.logo p{font-size:11px;color:var(--mut)}
.btn-h{background:var(--surf2);border:.5px solid var(--brd);border-radius:8px;padding:6px 12px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .2s,border-color .2s}
.btn-h:hover{color:var(--txt);border-color:var(--acc)}
.main{max-width:1300px;margin:0 auto;padding:20px}
/* CHOIX PLAN */
.chooser{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.chooser label{font-size:13px;color:var(--mut)}
.pbtn{padding:8px 20px;border-radius:10px;border:.5px solid var(--brd);background:var(--surf);color:var(--mut);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.pbtn:hover{border-color:var(--acc);color:var(--txt)}
.pbtn.pa{background:rgba(252,76,2,.15);border-color:var(--ora);color:var(--ora)}
.pbtn.pb{background:rgba(79,142,247,.15);border-color:var(--acc);color:var(--acc)}
.pbtn.pc{background:rgba(34,197,94,.15);border-color:var(--grn);color:var(--grn)}
.pdesc{font-size:12px;color:var(--mut);padding:6px 12px;background:var(--surf);border-radius:8px;border:.5px solid var(--brd)}
/* ONGLETS */
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tbtn{padding:7px 16px;border-radius:8px;border:.5px solid var(--brd);background:var(--surf);color:var(--mut);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.tbtn.on{background:var(--surf2);border-color:var(--acc);color:var(--txt)}
.tpan{display:none}
.tpan.on{display:block}
/* PLAN */
.ph-block{margin-bottom:28px}
.ph-head{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;margin-bottom:12px;border:.5px solid var(--brd)}
.ph-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ph-title{font-size:14px;font-weight:600}
.ph-period{font-size:11px;color:var(--mut);margin-left:auto}
.wk-block{margin-bottom:14px}
.wk-head{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--surf);border-radius:8px 8px 0 0;border:.5px solid var(--brd);border-bottom:none}
.wk-num{font-size:10px;font-weight:700;color:var(--ora);letter-spacing:.06em;text-transform:uppercase}
.wk-title{font-size:12px;color:var(--txt)}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);border:.5px solid var(--brd);border-radius:0 0 8px 8px;overflow:hidden}
.dc{border-right:.5px solid var(--brd)}
.dc:last-child{border-right:none}
.dh{background:var(--surf2);padding:5px 6px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);border-bottom:.5px solid var(--brd)}
.dh span{font-size:8px;opacity:.6;font-weight:400;display:block}
.dcell{background:var(--surf);padding:7px;font-size:11px;color:#a8b0c8;line-height:1.5;white-space:pre-line;min-height:55px}
.dcell.repos{color:rgba(122,128,153,.35);font-style:italic}
.dcell.course{background:rgba(252,76,2,.08);color:#fc7c42;font-weight:600}
.dcell.recup{background:rgba(79,142,247,.05)}
.wk-note{font-size:11px;color:var(--mut);padding:7px 12px;background:rgba(252,76,2,.04);border:.5px solid var(--brd);border-top:none;border-radius:0 0 8px 8px;line-height:1.6}
/* SUIVI */
.sv-wrap{margin-bottom:20px}
.sv-wktitle{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;padding:6px 10px;background:var(--surf);border-radius:8px}
.sv-grid{display:grid;grid-template-columns:repeat(7,1fr);border:.5px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:8px}
.sv-day{border-right:.5px solid var(--brd);background:var(--surf)}
.sv-day:last-child{border-right:none}
.sv-dh{background:var(--surf2);padding:5px 3px;text-align:center;font-size:9px;font-weight:700;color:var(--mut);border-bottom:.5px solid var(--brd);text-transform:uppercase}
.sv-dh span{font-size:7px;opacity:.6;font-weight:400;display:block}
.sv-db{padding:5px 3px}
.sv-sel{width:100%;background:var(--surf2);border:.5px solid var(--brd);border-radius:4px;padding:3px 2px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:10px;outline:none;margin-bottom:3px;cursor:pointer}
.sv-inp{width:100%;background:var(--surf2);border:.5px solid var(--brd);border-radius:4px;padding:3px 4px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:10px;outline:none;margin-bottom:2px}
.sv-inp::placeholder{color:var(--mut)}
.sv-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.cumul{background:var(--surf);border:.5px solid var(--brd);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--mut)}
.cumul strong{color:var(--txt)}
.btn-sv{padding:6px 16px;border-radius:7px;border:none;background:var(--acc);color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-sv:hover{opacity:.9}
/* RECAP */
.rtw{overflow-x:auto;border-radius:8px;border:.5px solid var(--brd);margin-bottom:16px}
.rt{width:100%;border-collapse:collapse;font-size:12px;background:var(--surf);min-width:700px}
.rt th{background:var(--surf2);color:var(--mut);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px;text-align:center;border-bottom:.5px solid var(--brd);white-space:nowrap}
.rt td{padding:6px 8px;text-align:center;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--txt)}
.rt tr:last-child td{border-bottom:none}
.tdn{text-align:left!important;font-weight:600}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surf2);border:.5px solid rgba(34,197,94,.4);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--grn);transition:transform .3s;z-index:100;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(224,0,32,.4);color:#ff6b6b}
/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--mut);font-size:14px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:800px){.wk-grid,.sv-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

var JOURS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var SENS  = ['','\u{1F60A}','\u{1F642}','\u{1F610}','\u{1F613}','\u{1F630}'];
var SLBL  = ['— Repos','\u{1F60A} Très facile','\u{1F642} Facile','\u{1F610} Normal','\u{1F613} Difficile','\u{1F630} Très difficile'];
var DESCS = {
  A:'\u{1F3D4} Plan A — \u00BD Barjo 50km / 1200m D+ · 21 juin 2026',
  B:'\u{1F3C3} Plan B — Trail des Tours 28km / 300m D+ · 31 mai 2026',
  C:'\u{1F3AF} Plan C — Trail des Tours 15km / 120m D+ · 31 mai 2026'
};
var PHASE_COLORS = {
  'PHASE 1 \u2014 FONCIER':'#22c55e',
  'PHASE 2 \u2014 D\u00C9VELOPPEMENT':'#f59e0b',
  'PHASE 3 \u2014 TRAIL DES TOURS':'#4f8ef7',
  'PHASE 4 \u2014 BARJO (Plan A)':'#fc4c02'
};

var db, auth;
var currentUid = null;
var currentPlan = null;
var isAdmin = false;

// ── Firebase config ──
var firebaseConfig = {

// ── Init Firebase ──
firebase.initializeApp(firebaseConfig);

// ── Utilitaires ──
function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(function(){ t.className = 'toast' + (err ? ' err' : ''); }, 3000);
}

function hexRgb(h) {
  return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);
}

function dayClass(t) {
  if (!t) return 'repos';
  var lo = t.toLowerCase();
  if (lo === 'repos' || lo.startsWith('repos')) return 'repos';
  if (t.indexOf('BARJO')>=0 || t.indexOf('Trail des Tours')>=0 || t.indexOf('\u{1F3AF}')>=0 || t.indexOf('\u{1F3C6}')>=0) return 'course';
  if (t.toLowerCase().indexOf('r\u00e9cup')>=0) return 'recup';
  return '';
}

// ── Construction HTML du plan ──
function buildPlan(plan) {
  var h = '';
  for (var phaseName in DATA) {
    var phase = DATA[phaseName];
    if (phaseName.indexOf('BARJO') >= 0 && plan !== 'A') continue;
    var col = '#4f8ef7';
    for (var k in PHASE_COLORS) { if (phaseName.indexOf(k.replace(/\\u[\/\w]+/g,'')) >= 0 || phaseName === k) { col = PHASE_COLORS[k]; break; } }
    // Chercher la couleur par inclusion du mot clé
    if (phaseName.indexOf('FONCIER')>=0) col='#22c55e';
    else if (phaseName.indexOf('BARJO')>=0) col='#fc4c02';
    else if (phaseName.indexOf('TRAIL DES TOURS')>=0) col='#4f8ef7';
    else if (phaseName.indexOf('VELOPPEMENT')>=0||phaseName.indexOf('DÉVELOPPEMENT')>=0) col='#f59e0b';
    var rgb = hexRgb(col);
    h += '<div class="ph-block">';
    h += '<div class="ph-head" style="background:rgba('+rgb+',.06);border-color:rgba('+rgb+',.25)">';
    h += '<div class="ph-dot" style="background:'+col+'"></div>';
    h += '<span class="ph-title">'+phase.info.label+'</span>';
    h += '<span class="ph-period">'+phase.info.period+'</span>';
    h += '</div>';
    for (var wi=0; wi<phase.weeks.length; wi++) {
      var w = phase.weeks[wi];
      var days = (plan === 'A') ? w.planA : w.planBC;
      h += '<div class="wk-block">';
      h += '<div class="wk-head"><span class="wk-num">'+w.num+'</span><span class="wk-title">'+w.title+'</span></div>';
      h += '<div class="wk-grid">';
      for (var i=0;i<7;i++) {
        var txt = (days && days[i]) ? days[i] : 'Repos';
        var dc = dayClass(txt);
        h += '<div class="dc"><div class="dh">'+JOURS[i]+'<span>'+(w.dates[i]||'')+'</span></div>';
        h += '<div class="dcell '+dc+'">'+txt+'</div></div>';
      }
      h += '</div>';
      if (w.note) h += '<div class="wk-note">'+w.note+'</div>';
      h += '</div>';
    }
    h += '</div>';
  }
  return h;
}

// ── Construction HTML du suivi ──
function buildSuivi(plan, saved) {
  var h = '<p style="font-size:12px;color:var(--mut);margin-bottom:16px;">Remplis tes sensations après chaque séance puis clique sur Sauvegarder.</p>';
  for (var phaseName in DATA) {
    var phase = DATA[phaseName];
    if (phaseName.indexOf('BARJO') >= 0 && plan !== 'A') continue;
    for (var wi=0; wi<phase.weeks.length; wi++) {
      var w = phase.weeks[wi];
      var wk = 'w_'+w.num;
      var cumKm=0, cumDp=0;
      for (var i=0;i<7;i++) {
        cumKm += parseFloat(saved[wk+'_km'+i]||0);
        cumDp  += parseFloat(saved[wk+'_dp'+i]||0);
      }
      h += '<div class="sv-wrap">';
      h += '<div class="sv-wktitle">'+w.num+' — '+w.title+'</div>';
      h += '<div class="sv-grid">';
      for (var i=0;i<7;i++) {
        var sv   = saved[wk+'_sens'+i]||'';
        var km   = saved[wk+'_km'+i]||'';
        var dp   = saved[wk+'_dp'+i]||'';
        var opts = '';
        for (var s=0;s<SLBL.length;s++) {
          opts += '<option value="'+SENS[s]+'"'+(SENS[s]===sv?' selected':'')+'>'+SLBL[s]+'</option>';
        }
        h += '<div class="sv-day">';
        h += '<div class="sv-dh">'+JOURS[i]+'<span>'+(w.dates[i]||'')+'</span></div>';
        h += '<div class="sv-db">';
        h += '<select class="sv-sel" id="'+wk+'_sens'+i+'">'+opts+'</select>';
        h += '<input class="sv-inp" type="number" step="0.1" min="0" placeholder="km" id="'+wk+'_km'+i+'" value="'+km+'">';
        h += '<input class="sv-inp" type="number" step="10" min="0" placeholder="D+" id="'+wk+'_dp'+i+'" value="'+dp+'">';
        h += '</div></div>';
      }
      h += '</div>';
      h += '<div class="sv-foot">';
      h += '<div class="cumul">Cumul : <strong>'+cumKm.toFixed(1)+' km</strong> · <strong>'+Math.round(cumDp)+' m D+</strong></div>';
      h += '<button class="btn-sv" onclick="saveSuivi(''+wk+'')">\u{1F4BE} Sauvegarder</button>';
      h += '</div></div>';
    }
  }
  return h;
}

// ── Choisir un plan ──
function choosePlan(plan) {
  currentPlan = plan;
  document.getElementById('btn-a').className = 'pbtn' + (plan==='A'?' pa':'');
  document.getElementById('btn-b').className = 'pbtn' + (plan==='B'?' pb':'');
  document.getElementById('btn-c').className = 'pbtn' + (plan==='C'?' pc':'');
  document.getElementById('pdesc').textContent = DESCS[plan] || '';

  // Afficher le plan immédiatement
  document.getElementById('p-plan').innerHTML = buildPlan(plan);

  // Charger et afficher le suivi
  if (currentUid) {
    db.collection('suivi_course').doc(currentUid).get().then(function(snap) {
      var saved = snap.exists ? snap.data() : {};
      document.getElementById('p-suivi').innerHTML = buildSuivi(plan, saved);
    }).catch(function() {
      document.getElementById('p-suivi').innerHTML = buildSuivi(plan, {});
    });
    // Sauvegarder le choix du plan
    db.collection('suivi_course').doc(currentUid).set({_plan: plan}, {merge: true}).catch(function(){});
  } else {
    document.getElementById('p-suivi').innerHTML = buildSuivi(plan, {});
  }
}

// ── Sauvegarder le suivi d'une semaine ──
function saveSuivi(wk) {
  if (!currentUid) { toast('Non connecté', true); return; }
  var data = {_plan: currentPlan};
  var cumKm=0, cumDp=0;
  for (var i=0;i<7;i++) {
    var s = document.getElementById(wk+'_sens'+i);
    var k = document.getElementById(wk+'_km'+i);
    var d = document.getElementById(wk+'_dp'+i);
    data[wk+'_sens'+i] = s ? s.value : '';
    data[wk+'_km'+i]   = k ? k.value : '';
    data[wk+'_dp'+i]   = d ? d.value : '';
    cumKm += parseFloat((k&&k.value)||0);
    cumDp  += parseFloat((d&&d.value)||0);
  }
  data[wk+'_cumkm'] = cumKm.toFixed(1);
  data[wk+'_cumdp'] = Math.round(cumDp);
  db.collection('suivi_course').doc(currentUid).set(data, {merge:true})
    .then(function(){ toast('\u2713 Suivi sauvegardé !'); })
    .catch(function(e){ toast('Erreur : '+e.message, true); });
}

// ── Vue CoachDav ──
function loadRecap() {
  if (!isAdmin) return;
  var div = document.getElementById('p-recap');
  div.innerHTML = '<div class="loading"><div class="spin"></div> Chargement...</div>';
  db.collection('users').get().then(function(usersSnap) {
    var allUsers = [];
    usersSnap.forEach(function(d) {
      allUsers.push({uid:d.id, prenom:d.data().prenom||'', nom:d.data().nom||'', plan:'?'});
    });
    // Charger les suivis
    var promises = allUsers.map(function(u) {
      return db.collection('suivi_course').doc(u.uid).get().then(function(snap) {
        return {u:u, snap:snap};
      }).catch(function(){ return {u:u, snap:null}; });
    });
    return Promise.all(promises);
  }).then(function(results) {
    var users = [], suivis = {};
    results.forEach(function(r) {
      if (r.snap && r.snap.exists) {
        var sd = r.snap.data();
        suivis[r.u.uid] = sd;
        r.u.plan = sd._plan || '?';
        // Ne garder que ceux qui ont au moins une donnée
        var hasData = Object.keys(sd).some(function(k){
          return (k.indexOf('_sens')>=0||k.indexOf('_km')>=0) && sd[k]!=='' && sd[k]!==undefined && sd[k]!=='0';
        });
        if (hasData) users.push(r.u);
      }
    });
    if (!users.length) {
      document.getElementById('p-recap').innerHTML = '<p style="color:var(--mut);font-size:13px;padding:20px 0">Aucun adhérent n\'a encore rempli son suivi.</p>';
      return;
    }
    var html = '';
    for (var phaseName in DATA) {
      var phase = DATA[phaseName];
      html += '<h3 style="font-size:12px;color:var(--mut);margin:20px 0 8px;text-transform:uppercase;letter-spacing:.06em">'+phase.info.label+'</h3>';
      for (var wi=0;wi<phase.weeks.length;wi++) {
        var w = phase.weeks[wi];
        var wk = 'w_'+w.num;
        html += '<div class="rtw"><table class="rt"><thead><tr><th style="text-align:left">Adhérent</th><th>Plan</th>';
        for (var i=0;i<7;i++) html += '<th>'+JOURS[i]+'<br><span style="font-weight:400;font-size:8px;opacity:.7">'+(w.dates[i]||'')+'</span></th>';
        html += '<th>km</th><th>D+</th></tr></thead><tbody>';
        users.forEach(function(u) {
          var sd = suivis[u.uid]||{};
          var pc = u.plan==='A'?'#fc4c02':u.plan==='B'?'#4f8ef7':u.plan==='C'?'#22c55e':'var(--mut)';
          html += '<tr><td class="tdn">'+u.prenom+' '+u.nom+'</td><td style="color:'+pc+';font-weight:700;font-size:11px">'+u.plan+'</td>';
          for (var i=0;i<7;i++) {
            var sens=sd[wk+'_sens'+i]||'', km=sd[wk+'_km'+i]||'';
            html += '<td title="'+(sens?sens+' ':'')+km+(km?'km':'')+'"><div style="font-size:14px">'+(sens||'—')+'</div>'+(km?'<div style="font-size:10px;color:var(--mut)">'+km+'km</div>':'')+'</td>';
          }
          html += '<td style="color:var(--acc);font-weight:600">'+(sd[wk+'_cumkm']||'0')+'</td><td style="color:var(--mut)">'+(sd[wk+'_cumdp']||'0')+'m</td></tr>';
        });
        html += '</tbody></table></div>';
      }
    }
    document.getElementById('p-recap').innerHTML = html;
  }).catch(function(e) {
    document.getElementById('p-recap').innerHTML = '<p style="color:#ff6b6b;font-size:13px">Erreur : '+e.message+'</p>';
  });
}

  ['plan','suivi','recap'].forEach(function(n) {

// ── Auth ──
auth.onAuthStateChanged(function(user) {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUid = user.uid;
  db.collection('users').doc(currentUid).get().then(function(snap) {
    var data = snap.exists ? snap.data() : {};
    var name = [data.prenom||'', data.nom||''].filter(Boolean).join(' ') || user.email;
    document.getElementById('uname').textContent = name;
    isAdmin = data.role === 'admin';
    if (isAdmin) document.getElementById('t-recap').style.display = 'block';
    // Charger le plan sauvegardé
    return db.collection('suivi_course').doc(currentUid).get();
  }).then(function(sc) {
    var plan = sc.exists ? (sc.data()._plan || null) : null;
    if (plan) {
      choosePlan(plan);
    } else {
      document.getElementById('p-plan').innerHTML = '<p style="color:var(--mut);font-size:14px;padding:40px 0;text-align:center">\u{1F446} Sélectionne ton plan ci-dessus</p>';
    }
  }).catch(function(e) {
    document.getElementById('p-plan').innerHTML = '<p style="color:#ff6b6b;font-size:13px;padding:20px 0">Erreur de connexion : '+e.message+'</p>';
  });
});
