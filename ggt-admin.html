<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGT — Admin CoachDav</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a23; --surface2: #1e2330;
    --border: rgba(255,255,255,0.08); --text: #e8eaf0;
    --muted: #7a8099; --accent: #4f8ef7; --orange: #fc4c02;
    --green: #22c55e;
  }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--text);
    background-image: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(252,76,2,0.06) 0%, transparent 60%);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 0.5px solid var(--border);
    background: rgba(22,26,35,0.9); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, #fc4c02, #e8350a);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo h1 { font-size: 16px; font-weight: 600; }
  .logo p { font-size: 11px; color: var(--orange); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-view {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 6px 12px; color: var(--muted);
    font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer;
    text-decoration: none; transition: color 0.2s;
  }
  .btn-view:hover { color: var(--text); }
  .btn-logout {
    background: transparent; border: 0.5px solid var(--border);
    border-radius: 8px; padding: 6px 12px; color: var(--muted);
    font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer;
  }

  .main { max-width: 900px; margin: 0 auto; padding: 24px; }

  /* NAVIGATION SEMAINE */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 14px; padding: 16px 20px; margin-bottom: 20px;
  }
  .nav-btn {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 7px 14px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); }
  .week-info { text-align: center; }
  .week-info h2 { font-size: 16px; font-weight: 600; }
  .week-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* STATUS */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .status-badge {
    font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 500;
  }
  .status-published { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-draft { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .status-empty { background: rgba(122,128,153,0.15); color: var(--muted); }

  /* JOURS */
  .days-list { display: flex; flex-direction: column; gap: 10px; }

  .day-row {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: grid; grid-template-columns: 100px 1fr;
    gap: 12px; align-items: start;
  }
  .day-row.today-row { border-color: rgba(79,142,247,0.3); }

  .day-label { padding-top: 6px; }
  .day-label .dname {
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .day-label .ddate { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .day-input-group { display: flex; flex-direction: column; gap: 8px; }

  .type-select {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 7px 10px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 12px; outline: none;
    cursor: pointer; width: 160px;
  }
  .type-select:focus { border-color: var(--accent); }

  textarea {
    width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px; outline: none;
    resize: vertical; min-height: 70px; line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* SHORTCUTS abréviations */
  .shortcuts { display: flex; flex-wrap: wrap; gap: 4px; }
  .shortcut {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 5px; padding: 2px 7px; font-size: 10px; color: var(--muted);
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .shortcut:hover { color: var(--accent); border-color: var(--accent); }

  /* BOUTONS BAS */
  .actions {
    display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;
  }
  .btn-save {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    background: var(--surface); border: 0.5px solid var(--border);
    color: var(--muted); font-family: 'Outfit', sans-serif;
    font-size: 14px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .btn-save:hover { border-color: var(--accent); color: var(--text); }
  .btn-publish {
    flex: 2; padding: 12px; border-radius: 10px; border: none;
    background: var(--orange); color: #fff;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .btn-publish:hover { opacity: 0.9; }
  .btn-publish:active { transform: scale(0.98); }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1e2330; border: 0.5px solid rgba(34,197,94,0.4);
    border-radius: 10px; padding: 12px 20px; font-size: 13px; color: var(--green);
    transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(224,0,32,0.4); color: #ff6b6b; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏃</div>
    <div>
      <h1>GGT Admin</h1>
      <p>CoachDav</p>
    </div>
  </div>
  <div class="header-right">
    <a href="planning.html" class="btn-view">👁 Voir comme adhérent</a>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</header>

<div class="main">

  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">← Précédente</button>
    <div class="week-info">
      <h2 id="week-label">Chargement...</h2>
      <p id="week-dates"></p>
    </div>
    <button class="nav-btn" onclick="changeWeek(1)">Suivante →</button>
  </div>

  <div class="status-bar">
    <span class="status-badge status-empty" id="status-badge">● Non publié</span>
    <span style="font-size:12px;color:var(--muted)" id="last-update"></span>
  </div>

  <div class="days-list" id="days-list">
    <div style="text-align:center;padding:40px;color:var(--muted)">Chargement...</div>
  </div>

  <div class="actions">
    <button class="btn-save" onclick="saveDraft()">💾 Enregistrer brouillon</button>
    <button class="btn-publish" id="btn-pub" onclick="publish()">📤 Publier la semaine</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚙️ REMPLACE PAR TA CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC7a3obsTgqf5An8v1t8fpQWCln-ZbZWpk",
  authDomain: "ggt-planning-30503.firebaseapp.com",
  projectId: "ggt-planning-30503",
  storageBucket: "ggt-planning-30503.firebasestorage.app",
  messagingSenderId: "172309807991",
  appId: "1:172309807991:web:6a66ce809970c10c375772"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
  const TYPES = [
    { value: "repos",   label: "😴 Repos" },
    { value: "cotes",   label: "🏔 Côtes" },
    { value: "seuil",   label: "⚡ Seuil / Fractionné" },
    { value: "sortie",  label: "🌲 Sortie longue" },
    { value: "footing", label: "🏃 Footing" },
    { value: "course",  label: "🏅 Course / Compét" },
    { value: "autre",   label: "📋 Autre" },
  ];
  const ABBREVS = ["CB","CH","CE","MB","ME","CCE","CCH","CCL","CCR","RAC","EF","TV","TP","VMA","R","S1","S2","D+"];

  let currentWeekOffset = 0;

  function getMondayOfWeek(offset = 0) {
    const now = new Date();
    const day = now.getDay() || 7;
    const monday = new Date(now);
    monday.setDate(now.getDate() - day + 1 + offset * 7);
    monday.setHours(0,0,0,0);
    return monday;
  }

  function getWeekKey(monday) { return monday.toISOString().split('T')[0]; }

  function formatDate(date) {
    return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 3000);
  }

  function insertAbbrev(dayIndex, abbrev) {
    const ta = document.getElementById(`contenu-${dayIndex}`);
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0,start) + abbrev + ta.value.slice(end);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = start + abbrev.length;
  }

  async function renderWeek() {
    const monday = getMondayOfWeek(currentWeekOffset);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    const weekKey = getWeekKey(monday);
    const today = new Date(); today.setHours(0,0,0,0);

    document.getElementById('week-label').textContent =
      currentWeekOffset === 0 ? 'Cette semaine' :
      currentWeekOffset === -1 ? 'Semaine dernière' :
      currentWeekOffset === 1 ? 'Semaine prochaine' :
      `Semaine du ${formatDate(monday)}`;
    document.getElementById('week-dates').textContent =
      `${formatDate(monday)} – ${formatDate(sunday)}`;

    const snap = await getDoc(doc(db, "plannings", weekKey));
    const data = snap.exists() ? snap.data() : {};
    const jours = data.jours || [];
    const published = data.published || false;
    const updatedAt = data.updatedAt?.toDate();

    const badge = document.getElementById('status-badge');
    if (published) {
      badge.className = 'status-badge status-published';
      badge.textContent = '● Publié';
    } else if (jours.length) {
      badge.className = 'status-badge status-draft';
      badge.textContent = '● Brouillon';
    } else {
      badge.className = 'status-badge status-empty';
      badge.textContent = '● Vide';
    }
    document.getElementById('last-update').textContent = updatedAt
      ? `Dernière modif : ${updatedAt.toLocaleString('fr-FR')}` : '';

    let html = '';
    for (let i = 0; i < 7; i++) {
      const date = new Date(monday); date.setDate(monday.getDate() + i);
      const isToday = date.getTime() === today.getTime();
      const jour = jours[i] || {};
      const typeValue = jour.type || 'repos';
      const contenu = jour.contenu || '';

      const typeOptions = TYPES.map(t =>
        `<option value="${t.value}" ${t.value === typeValue ? 'selected' : ''}>${t.label}</option>`
      ).join('');

      const shortcuts = ABBREVS.map(a =>
        `<span class="shortcut" onclick="insertAbbrev(${i},'${a}')">${a}</span>`
      ).join('');

      const defaultPlaceholder = typeValue === 'repos' ? 'Repos' :
        typeValue === 'cotes' ? 'Ex: Footing 20\' à 55-65% + Gammes\n10 x CB\n10 x CE\nRAC 10\'' :
        typeValue === 'seuil' ? 'Ex: Footing 20\' à 55-65% + Gammes\n3 x 10\' à 75-80% VMA R3\'\nRAC 10\'' :
        typeValue === 'sortie' ? 'Ex: 1h30-1h45 TV · D+' : '';

      html += `
        <div class="day-row ${isToday ? 'today-row' : ''}">
          <div class="day-label">
            <div class="dname">${JOURS[i]}</div>
            <div class="ddate">${date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
          </div>
          <div class="day-input-group">
            <select class="type-select" id="type-${i}" onchange="onTypeChange(${i})">
              ${typeOptions}
            </select>
            <textarea id="contenu-${i}" placeholder="${defaultPlaceholder}">${contenu}</textarea>
            <div class="shortcuts">${shortcuts}</div>
          </div>
        </div>`;
    }
    document.getElementById('days-list').innerHTML = html;
  }

  function collectData() {
    return Array.from({length: 7}, (_,i) => ({
      type: document.getElementById(`type-${i}`)?.value || 'repos',
      contenu: document.getElementById(`contenu-${i}`)?.value.trim() || ''
    }));
  }

  window.onTypeChange = (i) => {
    const type = document.getElementById(`type-${i}`).value;
    const ta = document.getElementById(`contenu-${i}`);
    if (type === 'repos' && !ta.value.trim()) ta.placeholder = 'Repos';
    if (type === 'cotes') ta.placeholder = 'Ex: Footing 20\' + Gammes\n10 x CB\n10 x CE\nRAC 10\'';
    if (type === 'seuil') ta.placeholder = 'Ex: Footing 20\' + Gammes\n3 x 10\' à 75-80% VMA R3\'\nRAC 10\'';
    if (type === 'sortie') ta.placeholder = 'Ex: 1h30-1h45 TV · D+';
  };

  window.insertAbbrev = insertAbbrev;

  window.saveDraft = async () => {
    const monday = getMondayOfWeek(currentWeekOffset);
    const weekKey = getWeekKey(monday);
    try {
      await setDoc(doc(db, "plannings", weekKey), {
        jours: collectData(), published: false, updatedAt: serverTimestamp()
      });
      showToast('✓ Brouillon enregistré');
      renderWeek();
    } catch(e) { showToast('Erreur lors de la sauvegarde', true); }
  };

  window.publish = async () => {
    const btn = document.getElementById('btn-pub');
    btn.disabled = true; btn.textContent = 'Publication...';
    const monday = getMondayOfWeek(currentWeekOffset);
    const weekKey = getWeekKey(monday);
    try {
      await setDoc(doc(db, "plannings", weekKey), {
        jours: collectData(), published: true, updatedAt: serverTimestamp()
      });
      showToast('✓ Planning publié ! Les adhérents peuvent le voir.');
      renderWeek();
    } catch(e) { showToast('Erreur lors de la publication', true); }
    btn.disabled = false; btn.textContent = '📤 Publier la semaine';
  };

  window.changeWeek = (dir) => { currentWeekOffset += dir; renderWeek(); };
  window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists() || snap.data().role !== 'admin') {
      window.location.href = 'planning.html'; return;
    }
    renderWeek();
  });
</script>
</body>
</html>
