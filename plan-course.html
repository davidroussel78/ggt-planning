<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GGT — Plan de course 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surf:#161a23;--surf2:#1e2330;--brd:rgba(255,255,255,.08);--txt:#e8eaf0;--mut:#7a8099;--acc:#4f8ef7;--ora:#fc4c02;--grn:#22c55e;--amb:#f59e0b}
html,body{min-height:100%}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);background-image:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(79,142,247,.06),transparent 60%)}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:.5px solid var(--brd);background:rgba(22,26,35,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:36px;height:36px;border-radius:9px;object-fit:contain}
.logo h1{font-size:16px;font-weight:600}
.logo p{font-size:11px;color:var(--mut)}
.btn-h{background:var(--surf2);border:.5px solid var(--brd);border-radius:8px;padding:6px 12px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .2s,border-color .2s}
.btn-h:hover{color:var(--txt);border-color:var(--acc)}
.main{max-width:1300px;margin:0 auto;padding:20px}
.chooser{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.chooser label{font-size:13px;color:var(--mut)}
.pbtn{padding:8px 20px;border-radius:10px;border:.5px solid var(--brd);background:var(--surf);color:var(--mut);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.pbtn:hover{border-color:var(--acc);color:var(--txt)}
.pbtn.pa{background:rgba(252,76,2,.15);border-color:var(--ora);color:var(--ora)}
.pbtn.pb{background:rgba(79,142,247,.15);border-color:var(--acc);color:var(--acc)}
.pbtn.pc{background:rgba(34,197,94,.15);border-color:var(--grn);color:var(--grn)}
.pdesc{font-size:12px;color:var(--mut);padding:6px 12px;background:var(--surf);border-radius:8px;border:.5px solid var(--brd)}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tbtn{padding:7px 16px;border-radius:8px;border:.5px solid var(--brd);background:var(--surf);color:var(--mut);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.tbtn.on{background:var(--surf2);border-color:var(--acc);color:var(--txt)}
.tpan{display:none}
.tpan.on{display:block}
.ph-block{margin-bottom:28px}
.ph-head{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;margin-bottom:12px;border:.5px solid var(--brd)}
.ph-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ph-title{font-size:14px;font-weight:600}
.ph-period{font-size:11px;color:var(--mut);margin-left:auto}
.wk-block{margin-bottom:14px}
.wk-head{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--surf);border-radius:8px 8px 0 0;border:.5px solid var(--brd);border-bottom:none}
.wk-num{font-size:10px;font-weight:700;color:var(--ora);letter-spacing:.06em;text-transform:uppercase}
.wk-title{font-size:12px;color:var(--txt)}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);border:.5px solid var(--brd);border-radius:0 0 8px 8px;overflow:hidden}
.dc{border-right:.5px solid var(--brd)}
.dc:last-child{border-right:none}
.dh{background:var(--surf2);padding:5px 6px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);border-bottom:.5px solid var(--brd)}
.dh span{font-size:8px;opacity:.6;font-weight:400;display:block}
.dcell{background:var(--surf);padding:7px;font-size:11px;color:#a8b0c8;line-height:1.5;white-space:pre-line;min-height:55px}
.dcell.repos{color:rgba(122,128,153,.35);font-style:italic}
.dcell.course{background:rgba(252,76,2,.08);color:#fc7c42;font-weight:600}
.dcell.recup{background:rgba(79,142,247,.05)}
.wk-note{font-size:11px;color:var(--mut);padding:7px 12px;background:rgba(252,76,2,.04);border:.5px solid var(--brd);border-top:none;border-radius:0 0 8px 8px;line-height:1.6}
.sv-wrap{margin-bottom:20px}
.sv-wktitle{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;padding:6px 10px;background:var(--surf);border-radius:8px}
.sv-grid{display:grid;grid-template-columns:repeat(7,1fr);border:.5px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:8px}
.sv-day{border-right:.5px solid var(--brd);background:var(--surf)}
.sv-day:last-child{border-right:none}
.sv-dh{background:var(--surf2);padding:5px 3px;text-align:center;font-size:9px;font-weight:700;color:var(--mut);border-bottom:.5px solid var(--brd);text-transform:uppercase}
.sv-dh span{font-size:7px;opacity:.6;font-weight:400;display:block}
.sv-db{padding:5px 3px}
.sv-sel{width:100%;background:var(--surf2);border:.5px solid var(--brd);border-radius:4px;padding:3px 2px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:10px;outline:none;margin-bottom:3px;cursor:pointer}
.sv-inp{width:100%;background:var(--surf2);border:.5px solid var(--brd);border-radius:4px;padding:3px 4px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:10px;outline:none;margin-bottom:2px}
.sv-inp::placeholder{color:var(--mut)}
.sv-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.cumul{background:var(--surf);border:.5px solid var(--brd);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--mut)}
.cumul strong{color:var(--txt)}
.btn-sv{padding:6px 16px;border-radius:7px;border:none;background:var(--acc);color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-sv:hover{opacity:.9}
.rtw{overflow-x:auto;border-radius:8px;border:.5px solid var(--brd);margin-bottom:16px}
.rt{width:100%;border-collapse:collapse;font-size:12px;background:var(--surf);min-width:700px}
.rt th{background:var(--surf2);color:var(--mut);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px;text-align:center;border-bottom:.5px solid var(--brd);white-space:nowrap}
.rt td{padding:6px 8px;text-align:center;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--txt)}
.rt tr:last-child td{border-bottom:none}
.tdn{text-align:left!important;font-weight:600}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surf2);border:.5px solid rgba(34,197,94,.4);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--grn);transition:transform .3s;z-index:100;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(224,0,32,.4);color:#ff6b6b}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--mut);font-size:14px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:800px){.wk-grid,.sv-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

s une guerre. La vraie bataille c'est le 21 juin ! / Plan B → votre objectif, courez selon vos sensations ! / Plan C → le 15km se court plus vite, gérez dès le km 1. Bonne course à tous ! 🎉"}]}, "PHASE 4 — BARJO (Plan A)": {"info": {"label": "Phase 4 — Affûtage Barjo (Plan A)", "period": "1 → 21 juin 2026", "color": "#fc4c02"}, "weeks": [{"num": "S11", "title": "Récupération Trail des Tours · relance Barjo", "dates": ["01/06", "02/06", "03/06", "04/06", "05/06", "06/06", "07/06"], "planA": ["Repos complet", "Footing 1h (55-65% VMA)", "Repos", "Footing 20' (55-65% VMA)\n+ Gammes 10'\n+ 8×1' r1' (90-95% VMA)\n+ RAC 10'", "Repos", "Footing 45' (70% VMA) · TV", "2h30 TV\n700m D+\n30' allure Barjo cible en milieu"], "planBC": ["Félicitations ! 🎉\nTrail des Tours terminé", "Repos", "Repos", "Repos", "Repos", "Repos", "Repos"], "note": ""}, {"num": "S12", "title": "Affûtage · volume en baisse, qualité maintenue", "dates": ["08/06", "09/06", "10/06", "11/06", "12/06", "13/06", "14/06"], "planA": ["Repos\n\nPlanifier un RDV chez l'OSTEO", "Footing 20' (55-65% VMA)\n+ Gammes 10'\n+ 2×8' r3' (82-85% VMA)\n+ RAC 10'", "Repos", "Footing 1h (55-65% VMA)", "Repos", "Footing 40' (55-65% VMA)\n + 4×20'' accélérations\n+ RAC 10'", "1h30 TV\n200-300m D+"], "planBC": ["Repos", "Repos", "Repos", "Repos", "Repos", "Repos", "Repos"], "note": ""}, {"num": "S13", "title": "🎯 SEMAINE BARJO · Dernière ligne droite", "dates": ["15/06", "16/06", "17/06", "18/06", "19/06", "20/06", "21/06"], "planA": ["Repos", "Repos", "Repos", "Repos", "Repos", "Trot réveil 20-25'\n65% VMA · activer les jambes\nDormir tôt · hydratation max", "🎯 ½ BARJO TRAIL\n50km / 1200m D+\nDépart 10h00\nBarrière horaire max 8h20"], "planBC": ["Repos", "Repos", "Repos", "Repos", "Repos", "Repos", "Repos"], "note": "💬 Matériel obligatoire Barjo : Dossard visible · Couverture de survie · Sifflet · Téléphone chargé · Eau 500ml min · Coupe-vent. Bâtons autorisés."}]}};

  function phaseColor(n) {
    if (n.indexOf('FONCIER')>=0)    return '#22c55e';
    if (n.indexOf('BARJO')>=0)      return '#fc4c02';
    if (n.indexOf('TRAIL')>=0)      return '#4f8ef7';
    return '#f59e0b';
  }
  function hexRgb(h) { return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16); }
  function dayClass(t) {
    if (!t||t.toLowerCase().startsWith('repos')) return 'repos';
    if (t.indexOf('BARJO')>=0||t.indexOf('Trail des Tours')>=0||t.indexOf('🎯')>=0||t.indexOf('🏆')>=0) return 'course';
    if (t.toLowerCase().indexOf('récup')>=0) return 'recup';
    return '';
  }
  function showToast(msg, err) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show'+(err?' err':'');
    setTimeout(()=>t.className='toast'+(err?' err':''), 3000);
  }

  function buildPlan(plan) {
    let h = '';
    for (const [pname, phase] of Object.entries(DATA)) {
      if (pname.indexOf('BARJO')>=0 && plan!=='A') continue;
      const col = phaseColor(pname), rgb = hexRgb(col);
      h += `<div class="ph-block">
        <div class="ph-head" style="background:rgba(${rgb},.06);border-color:rgba(${rgb},.25)">
          <div class="ph-dot" style="background:${col}"></div>
          <span class="ph-title">${phase.info.label}</span>
          <span class="ph-period">${phase.info.period}</span>
        </div>`;
      for (const w of phase.weeks) {
        const days = plan==='A' ? w.planA : w.planBC;
        h += `<div class="wk-block">
          <div class="wk-head"><span class="wk-num">${w.num}</span><span class="wk-title">${w.title}</span></div>
          <div class="wk-grid">`;
        for (let i=0;i<7;i++) {
          const txt = (days&&days[i]) ? days[i] : 'Repos';
          h += `<div class="dc"><div class="dh">${JOURS[i]}<span>${w.dates[i]||''}</span></div><div class="dcell ${dayClass(txt)}">${txt}</div></div>`;
        }
        h += '</div>';
        if (w.note) h += `<div class="wk-note">${w.note}</div>`;
        h += '</div>';
      }
      h += '</div>';
    }
    return h;
  }

  function buildSuivi(plan, saved) {
    let h = '<p style="font-size:12px;color:var(--mut);margin-bottom:16px;">Remplis tes sensations après chaque séance puis clique Sauvegarder.</p>';
    for (const [pname, phase] of Object.entries(DATA)) {
      if (pname.indexOf('BARJO')>=0 && plan!=='A') continue;
      for (const w of phase.weeks) {
        const wk = 'w_'+w.num;
        let cumKm=0, cumDp=0;
        for (let i=0;i<7;i++) { cumKm+=parseFloat(saved[wk+'_km'+i]||0); cumDp+=parseFloat(saved[wk+'_dp'+i]||0); }
        h += `<div class="sv-wrap"><div class="sv-wktitle">${w.num} — ${w.title}</div><div class="sv-grid">`;
        for (let i=0;i<7;i++) {
          const sv=saved[wk+'_sens'+i]||'', km=saved[wk+'_km'+i]||'', dp=saved[wk+'_dp'+i]||'';
          const opts = SLBL.map((l,idx)=>`<option value="${SENS[idx]}" ${SENS[idx]===sv?'selected':''}>${l}</option>`).join('');
          h += `<div class="sv-day">
            <div class="sv-dh">${JOURS[i]}<span>${w.dates[i]||''}</span></div>
            <div class="sv-db">
              <select class="sv-sel" id="${wk}_sens${i}">${opts}</select>
              <input class="sv-inp" type="number" step="0.1" min="0" placeholder="km" id="${wk}_km${i}" value="${km}">
              <input class="sv-inp" type="number" step="10"  min="0" placeholder="D+" id="${wk}_dp${i}" value="${dp}">
            </div>
          </div>`;
        }
        h += `</div><div class="sv-foot">
          <div class="cumul">Cumul : <strong>${cumKm.toFixed(1)} km</strong> · <strong>${Math.round(cumDp)} m D+</strong></div>
          <button class="btn-sv" onclick="saveSuivi('${wk}')">💾 Sauvegarder</button>
        </div></div>`;
      }
    }
    return h;
  }

  window.choosePlan = async function(plan) {
    currentPlan = plan;
    ['a','b','c'].forEach(x => document.getElementById('btn-'+x).className='pbtn');
    document.getElementById('btn-'+plan.toLowerCase()).classList.add('p'+plan.toLowerCase());
    document.getElementById('pdesc').textContent = DESCS[plan]||'';
    document.getElementById('p-plan').innerHTML = buildPlan(plan);
    let saved = {};
    if (currentUid) {
      try { const s=await getDoc(doc(db,'suivi_course',currentUid)); if(s.exists()) saved=s.data(); } catch(e) {}
      // Le plan est sauvegardé uniquement lors d'un saveSuivi explicite
    }
    document.getElementById('p-suivi').innerHTML = buildSuivi(plan, saved);
  };

  window.saveSuivi = async function(wk) {
    if (!currentUid) { showToast('Non connecté',true); return; }
    const data = {_plan: currentPlan};
    let cumKm=0, cumDp=0;
    for (let i=0;i<7;i++) {
      data[wk+'_sens'+i] = document.getElementById(wk+'_sens'+i)?.value||'';
      data[wk+'_km'+i]   = document.getElementById(wk+'_km'+i)?.value||'';
      data[wk+'_dp'+i]   = document.getElementById(wk+'_dp'+i)?.value||'';
      cumKm+=parseFloat(data[wk+'_km'+i]||0);
      cumDp +=parseFloat(data[wk+'_dp'+i]||0);
    }
    data[wk+'_cumkm'] = cumKm.toFixed(1);
    data[wk+'_cumdp'] = Math.round(cumDp);
    try { await setDoc(doc(db,'suivi_course',currentUid),data,{merge:true}); showToast('✓ Suivi sauvegardé !'); }
    catch(e) { showToast('Erreur : '+e.message,true); }
  };

  window.switchTab = function(name) {
    ['plan','suivi','recap'].forEach(n => {
      document.getElementById('p-'+n).className = 'tpan'+(n===name?' on':'');
      document.getElementById('t-'+n).className = 'tbtn'+(n===name?' on':'');
    });
    if (name==='recap') loadRecap();
  };

  window.logout = () => signOut(auth).then(()=>window.location.href='index.html');

  async function loadRecap() {
    if (!isAdmin) return;
    const div = document.getElementById('p-recap');
    div.innerHTML = '<div class="loading"><div class="spin"></div> Chargement...</div>';
    try {
      const usersSnap = await getDocs(collection(db,'users'));
      const allUsers = [];
      usersSnap.forEach(d => allUsers.push({uid:d.id, prenom:d.data().prenom||'', nom:d.data().nom||'', plan:'?'}));
      const users=[], suivis={};
      for (const u of allUsers) {
        try {
          const snap = await getDoc(doc(db,'suivi_course',u.uid));
          if (snap.exists()) {
            const sd=snap.data(); suivis[u.uid]=sd; u.plan=sd._plan||'?';
            if (Object.keys(sd).some(k=>(k.includes('_sens')||k.includes('_km'))&&sd[k]&&sd[k]!=='')) users.push(u);
          }
        } catch(e) {}
      }
      if (!users.length) { div.innerHTML='<p style="color:var(--mut);font-size:13px;padding:20px 0">Aucun adh&eacute;rent n&apos;a encore rempli son suivi.</p>'; return; }
      let html='';
      for (const [pname,phase] of Object.entries(DATA)) {
        html+=`<h3 style="font-size:12px;color:var(--mut);margin:20px 0 8px;text-transform:uppercase;letter-spacing:.06em">${phase.info.label}</h3>`;
        for (const w of phase.weeks) {
          const wk='w_'+w.num;
          html+=`<div class="rtw"><table class="rt"><thead><tr><th style="text-align:left">Adhérent</th><th>Plan</th>`;
          for (let i=0;i<7;i++) html+=`<th>${JOURS[i]}<br><span style="font-weight:400;font-size:8px;opacity:.7">${w.dates[i]||''}</span></th>`;
          html+=`<th>km</th><th>D+</th></tr></thead><tbody>`;
          for (const u of users) {
            const sd=suivis[u.uid]||{};
            const pc=u.plan==='A'?'#fc4c02':u.plan==='B'?'#4f8ef7':u.plan==='C'?'#22c55e':'var(--mut)';
            html+=`<tr><td class="tdn">${u.prenom} ${u.nom}</td><td style="color:${pc};font-weight:700;font-size:11px">${u.plan}</td>`;
            for (let i=0;i<7;i++) {
              const sens=sd[wk+'_sens'+i]||'', km=sd[wk+'_km'+i]||'', dp=sd[wk+'_dp'+i]||'';
              html+=`<td><div style="font-size:14px">${sens||'—'}</div>${km?`<div style="font-size:10px;color:var(--mut)">${km}km</div>`:''  }${dp?`<div style="font-size:10px;color:var(--acc)">${dp}m</div>`:''}</td>`;
            }
            html+=`<td style="color:var(--acc);font-weight:600">${sd[wk+'_cumkm']||'0'}</td><td style="color:var(--mut)">${sd[wk+'_cumdp']||'0'}m</td></tr>`;
          }
          html+=`</tbody></table></div>`;
        }
    }
    // Tableau cumul total par adhérent (toutes semaines confondues)
    html += `<h3 style="font-size:12px;color:var(--mut);margin:24px 0 8px;text-transform:uppercase;letter-spacing:.06em">📊 Cumul total saison</h3>`;
    html += `<div class="rtw"><table class="rt"><thead><tr>
      <th style="text-align:left">Adhérent</th><th>Plan</th>
      <th>Total km</th><th>Total D+</th>
    </tr></thead><tbody>`;
    for (const u of users) {
      const sd = suivis[u.uid]||{};
      let totalKm=0, totalDp=0;
      // Additionner tous les cumuls hebdo
      Object.keys(sd).forEach(k => {
        if (k.endsWith('_cumkm')) totalKm += parseFloat(sd[k]||0);
        if (k.endsWith('_cumdp')) totalDp += parseFloat(sd[k]||0);
      });
      const pc = u.plan==='A'?'#fc4c02':u.plan==='B'?'#4f8ef7':u.plan==='C'?'#22c55e':'var(--mut)';
      html += `<tr>
        <td class="tdn">${u.prenom} ${u.nom}</td>
        <td style="color:${pc};font-weight:700;font-size:11px">${u.plan}</td>
        <td style="color:var(--acc);font-weight:700;font-size:13px">${totalKm.toFixed(1)} km</td>
        <td style="color:var(--mut);font-weight:600">${Math.round(totalDp)} m</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
      div.innerHTML=html;
    } catch(e) { div.innerHTML=`<p style="color:#ff6b6b;font-size:13px">Erreur : ${e.message}</p>`; }
  }

  let redirecting = false;
  onAuthStateChanged(auth, async (user) => {
    if (redirecting) return;
    if (!user) { redirecting=true; window.location.href='index.html'; return; }
    currentUid = user.uid;
    const snap = await getDoc(doc(db,'users',currentUid));
    const data = snap.exists() ? snap.data() : {};
    document.getElementById('user-name').textContent = [data.prenom||'',data.nom||''].filter(Boolean).join(' ')||user.email;
    isAdmin = data.role==='admin';
    if (isAdmin) document.getElementById('t-recap').style.display='block';
    try {
      const sc = await getDoc(doc(db,'suivi_course',currentUid));
      const plan = sc.exists() ? (sc.data()._plan||null) : null;
      if (plan) { await window.choosePlan(plan); }
      else { document.getElementById('p-plan').innerHTML='<p style="color:var(--mut);font-size:14px;padding:40px 0;text-align:center">👆 Sélectionne ton plan ci-dessus</p>'; }
    } catch(e) {
      document.getElementById('p-plan').innerHTML=`<p style="color:#ff6b6b;font-size:13px;padding:20px">Erreur : ${e.message}</p>`;
    }
  });
</script>
